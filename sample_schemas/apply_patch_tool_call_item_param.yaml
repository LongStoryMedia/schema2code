$schema: http://json-schema.org/draft-07/schema#
title: ApplyPatchToolCallItemParam
description: A tool call representing a request to create, delete, or update files
  using diff patches.
type: object
properties:
  call_id:
    description: The unique ID of the apply patch tool call generated by the model.
    maxLength: 64
    minLength: 1
    type: string
  id:
    anyOf:
    - description: The unique ID of the apply patch tool call. Populated when this
        item is returned via API.
      example: apc_123
      type: string
    - type: 'null'
  operation:
    $ref: apply_patch_operation_param.yaml
    description: The specific create, delete, or update instruction for the apply_patch
      tool call.
  status:
    $ref: apply_patch_call_status_param.yaml
    description: The status of the apply patch tool call. One of `in_progress` or
      `completed`.
  type:
    default: apply_patch_call
    description: The type of the item. Always `apply_patch_call`.
    enum:
    - apply_patch_call
    type: string
required:
- type
- call_id
- status
- operation
