$schema: http://json-schema.org/draft-07/schema#
title: RunToolCallObject
description: Tool call objects
type: object
properties:
  function:
    description: The function definition.
    properties:
      arguments:
        description: The arguments that the model expects you to pass to the function.
        type: string
      name:
        description: The name of the function.
        type: string
    required:
    - name
    - arguments
    type: object
  id:
    description: The ID of the tool call. This ID must be referenced when you submit
      the tool outputs in using the [Submit tool outputs to run](https://platform.openai.com/docs/api-reference/runs/submitToolOutputs)
      endpoint.
    type: string
  type:
    description: The type of tool call the output is required for. For now, this is
      always `function`.
    enum:
    - function
    type: string
required:
- id
- type
- function
