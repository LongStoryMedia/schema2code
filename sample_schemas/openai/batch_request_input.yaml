$schema: http://json-schema.org/draft-07/schema#
title: BatchRequestInput
description: The per-line object of the batch input file
type: object
properties:
  custom_id:
    description: A developer-provided per-request id that will be used to match outputs
      to inputs. Must be unique for each request in a batch.
    type: string
  method:
    description: The HTTP method to be used for the request. Currently only `POST`
      is supported.
    enum:
    - POST
    type: string
  url:
    description: The OpenAI API relative URL to be used for the request. Currently
      `/v1/responses`, `/v1/chat/completions`, `/v1/embeddings`, `/v1/completions`,
      and `/v1/moderations` are supported.
    type: string
