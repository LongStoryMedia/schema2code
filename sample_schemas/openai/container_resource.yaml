$schema: http://json-schema.org/draft-07/schema#
title: ContainerResource
type: object
properties:
  created_at:
    description: Unix timestamp (in seconds) when the container was created.
    type: integer
  expires_after:
    description: 'The container will expire after this time period.

      The anchor is the reference point for the expiration.

      The minutes is the number of minutes after the anchor before the container expires.

      '
    properties:
      anchor:
        description: The reference point for the expiration.
        enum:
        - last_active_at
        type: string
      minutes:
        description: The number of minutes after the anchor before the container expires.
        type: integer
    type: object
  id:
    description: Unique identifier for the container.
    type: string
  last_active_at:
    description: Unix timestamp (in seconds) when the container was last active.
    type: integer
  memory_limit:
    description: The memory limit configured for the container.
    enum:
    - 1g
    - 4g
    - 16g
    - 64g
    type: string
  name:
    description: Name of the container.
    type: string
  object:
    description: The type of this object.
    type: string
  status:
    description: Status of the container (e.g., active, deleted).
    type: string
required:
- id
- object
- name
- created_at
- status
- id
- name
- created_at
- status
