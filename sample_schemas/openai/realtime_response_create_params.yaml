$schema: http://json-schema.org/draft-07/schema#
title: RealtimeResponseCreateParams
description: Create a new Realtime response with these parameters
type: object
properties:
  audio:
    description: Configuration for audio input and output.
    properties:
      output:
        properties:
          format:
            $ref: realtime_audio_formats.yaml
            description: The format of the output audio.
          voice:
            $ref: voice_ids_shared.yaml
            default: alloy
            description: The voice the model uses to respond. Supported built-in voices
              are `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`, `shimmer`, `verse`,
              `marin`, and `cedar`. Voice cannot be changed during the session once
              the model has responded with audio at least once.
        type: object
    type: object
  conversation:
    anyOf:
    - type: string
    - default: auto
      enum:
      - auto
      - none
      type: string
    description: 'Controls which conversation the response is added to. Currently
      supports

      `auto` and `none`, with `auto` as the default value. The `auto` value

      means that the contents of the response will be added to the default

      conversation. Set this to `none` to create an out-of-band response which

      will not add items to default conversation.

      '
  input:
    description: 'Input items to include in the prompt for the model. Using this field

      creates a new context for this Response instead of using the default

      conversation. An empty array `[]` will clear the context for this Response.

      Note that this can include references to items that previously appeared in the
      session

      using their id.

      '
    items:
      $ref: realtime_conversation_item.yaml
    type: array
  instructions:
    description: 'The default system instructions (i.e. system message) prepended
      to model calls. This field allows the client to guide the model on desired responses.
      The model can be instructed on response content and format, (e.g. "be extremely
      succinct", "act friendly", "here are examples of good responses") and on audio
      behavior (e.g. "talk quickly", "inject emotion into your voice", "laugh frequently").
      The instructions are not guaranteed to be followed by the model, but they provide
      guidance to the model on the desired behavior.

      Note that the server sets default instructions which will be used if this field
      is not set and are visible in the `session.created` event at the start of the
      session.

      '
    type: string
  max_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  metadata:
    $ref: metadata.yaml
  output_modalities:
    description: 'The set of modalities the model used to respond, currently the only
      possible values are

      `[\"audio\"]`, `[\"text\"]`. Audio output always include a text transcript.
      Setting the

      output to mode `text` will disable audio output from the model.

      '
    items:
      enum:
      - text
      - audio
      type: string
    type: array
  prompt:
    $ref: prompt.yaml
  tool_choice:
    anyOf:
    - $ref: tool_choice_options.yaml
    - $ref: tool_choice_function.yaml
    - $ref: tool_choice_mcp.yaml
    default: auto
    description: 'How the model chooses tools. Provide one of the string modes or
      force a specific

      function/MCP tool.

      '
  tools:
    description: Tools available to the model.
    items:
      anyOf:
      - $ref: realtime_function_tool.yaml
      - $ref: mcp_tool.yaml
    type: array
