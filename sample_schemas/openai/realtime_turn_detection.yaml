$schema: http://json-schema.org/draft-07/schema#
title: RealtimeTurnDetection
anyOf:
- anyOf:
  - description: Server-side voice activity detection (VAD) which flips on when user
      speech is detected and off after a period of silence.
    properties:
      create_response:
        default: true
        description: 'Whether or not to automatically generate a response when a VAD
          stop event occurs. If `interrupt_response` is set to `false` this may fail
          to create a response if the model is already responding.


          If both `create_response` and `interrupt_response` are set to `false`, the
          model will never respond automatically but VAD events will still be emitted.

          '
        type: boolean
      idle_timeout_ms:
        anyOf:
        - description: 'Optional timeout after which a model response will be triggered
            automatically. This is

            useful for situations in which a long pause from the user is unexpected,
            such as a phone

            call. The model will effectively prompt the user to continue the conversation
            based

            on the current context.


            The timeout value will be applied after the last model response''s audio
            has finished playing,

            i.e. it''s set to the `response.done` time plus audio playback duration.


            An `input_audio_buffer.timeout_triggered` event (plus events

            associated with the Response) will be emitted when the timeout is reached.

            Idle timeout is currently only supported for `server_vad` mode.

            '
          maximum: 30000
          minimum: 5000
          type: integer
        - type: 'null'
      interrupt_response:
        default: true
        description: 'Whether or not to automatically interrupt (cancel) any ongoing
          response with output to the default

          conversation (i.e. `conversation` of `auto`) when a VAD start event occurs.
          If `true` then the response will be cancelled, otherwise it will continue
          until complete.


          If both `create_response` and `interrupt_response` are set to `false`, the
          model will never respond automatically but VAD events will still be emitted.

          '
        type: boolean
      prefix_padding_ms:
        description: 'Used only for `server_vad` mode. Amount of audio to include
          before the VAD detected speech (in

          milliseconds). Defaults to 300ms.

          '
        type: integer
      silence_duration_ms:
        description: 'Used only for `server_vad` mode. Duration of silence to detect
          speech stop (in milliseconds). Defaults

          to 500ms. With shorter values the model will respond more quickly,

          but may jump in on short pauses from the user.

          '
        type: integer
      threshold:
        description: 'Used only for `server_vad` mode. Activation threshold for VAD
          (0.0 to 1.0), this defaults to 0.5. A

          higher threshold will require louder audio to activate the model, and

          thus might perform better in noisy environments.

          '
        type: number
      type:
        const: server_vad
        default: server_vad
        description: 'Type of turn detection, `server_vad` to turn on simple Server
          VAD.

          '
        type: string
    required:
    - type
    title: Server VAD
    type: object
  - description: Server-side semantic turn detection which uses a model to determine
      when the user has finished speaking.
    properties:
      create_response:
        default: true
        description: 'Whether or not to automatically generate a response when a VAD
          stop event occurs.

          '
        type: boolean
      eagerness:
        default: auto
        description: 'Used only for `semantic_vad` mode. The eagerness of the model
          to respond. `low` will wait longer for the user to continue speaking, `high`
          will respond more quickly. `auto` is the default and is equivalent to `medium`.
          `low`, `medium`, and `high` have max timeouts of 8s, 4s, and 2s respectively.

          '
        enum:
        - low
        - medium
        - high
        - auto
        type: string
      interrupt_response:
        default: true
        description: 'Whether or not to automatically interrupt any ongoing response
          with output to the default

          conversation (i.e. `conversation` of `auto`) when a VAD start event occurs.

          '
        type: boolean
      type:
        const: semantic_vad
        description: 'Type of turn detection, `semantic_vad` to turn on Semantic VAD.

          '
        type: string
    required:
    - type
    title: Semantic VAD
    type: object
  description: 'Configuration for turn detection, ether Server VAD or Semantic VAD.
    This can be set to `null` to turn off, in which case the client must manually
    trigger model response.


    Server VAD means that the model will detect the start and end of speech based
    on audio volume and respond at the end of user speech.


    Semantic VAD is more advanced and uses a turn detection model (in conjunction
    with VAD) to semantically estimate whether the user has finished speaking, then
    dynamically sets a timeout based on this probability. For example, if user audio
    trails off with "uhhm", the model will score a low probability of turn end and
    wait longer for the user to continue speaking. This can be useful for more natural
    conversations, but may have a higher latency.

    '
  discriminator:
    propertyName: type
  title: Realtime Turn Detection
- type: 'null'
