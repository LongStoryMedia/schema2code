$schema: http://json-schema.org/draft-07/schema#
title: RealtimeServerEventInputAudioBufferSpeechStarted
description: "Sent by the server when in `server_vad` mode to indicate that speech\
  \ has been \ndetected in the audio buffer. This can happen any time audio is added\
  \ to the \nbuffer (unless speech is already detected). The client may want to use\
  \ this \nevent to interrupt audio playback or provide visual feedback to the user.\
  \ \n\nThe client should expect to receive a `input_audio_buffer.speech_stopped`\
  \ event \nwhen speech stops. The `item_id` property is the ID of the user message\
  \ item \nthat will be created when speech stops and will also be included in the\
  \ \n`input_audio_buffer.speech_stopped` event (unless the client manually commits\
  \ \nthe audio buffer during VAD activation).\n"
type: object
properties:
  audio_start_ms:
    description: "Milliseconds from the start of all audio written to the buffer during\
      \ the \nsession when speech was first detected. This will correspond to the\
      \ \nbeginning of audio sent to the model, and thus includes the \n`prefix_padding_ms`\
      \ configured in the Session.\n"
    type: integer
  event_id:
    description: The unique ID of the server event.
    type: string
  item_id:
    description: 'The ID of the user message item that will be created when speech
      stops.

      '
    type: string
  type:
    const: input_audio_buffer.speech_started
    description: The event type, must be `input_audio_buffer.speech_started`.
required:
- event_id
- type
- audio_start_ms
- item_id
