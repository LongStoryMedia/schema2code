$schema: http://json-schema.org/draft-07/schema#
title: BatchFileExpirationAfter
description: The expiration policy for the output and/or error file that are generated
  for a batch.
type: object
properties:
  anchor:
    description: 'Anchor timestamp after which the expiration policy applies. Supported
      anchors: `created_at`. Note that the anchor is the file creation time, not the
      time the batch is created.'
    enum:
    - created_at
    type: string
  seconds:
    description: The number of seconds after the anchor time that the file will expire.
      Must be between 3600 (1 hour) and 2592000 (30 days).
    maximum: 2592000
    minimum: 3600
    type: integer
required:
- anchor
- seconds
