$schema: http://json-schema.org/draft-07/schema#
title: RealtimeConversationItemFunctionCall
description: A function call item in a Realtime conversation.
type: object
properties:
  arguments:
    description: 'The arguments of the function call. This is a JSON-encoded string
      representing the arguments passed to the function, for example `{"arg1": "value1",
      "arg2": 42}`.'
    type: string
  call_id:
    description: The ID of the function call.
    type: string
  id:
    description: The unique ID of the item. This may be provided by the client or
      generated by the server.
    type: string
  name:
    description: The name of the function being called.
    type: string
  object:
    description: Identifier for the API object being returned - always `realtime.item`.
      Optional when creating a new item.
    enum:
    - realtime.item
    type: string
  status:
    description: The status of the item. Has no effect on the conversation.
    enum:
    - completed
    - incomplete
    - in_progress
    type: string
  type:
    description: The type of the item. Always `function_call`.
    enum:
    - function_call
    type: string
required:
- type
- name
- arguments
