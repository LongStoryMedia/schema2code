$schema: http://json-schema.org/draft-07/schema#
title: CreateImageRequest
type: object
properties:
  background:
    default: auto
    description: 'Allows to set transparency for the background of the generated image(s).

      This parameter is only supported for the GPT image models. Must be one of

      `transparent`, `opaque` or `auto` (default value). When `auto` is used, the

      model will automatically determine the best background for the image.


      If `transparent`, the output format needs to support transparency, so it

      should be set to either `png` (default value) or `webp`.

      '
    enum:
    - transparent
    - opaque
    - auto
    example: transparent
    nullable: true
    type: string
  model:
    anyOf:
    - type: string
    - enum:
      - gpt-image-1.5
      - dall-e-2
      - dall-e-3
      - gpt-image-1
      - gpt-image-1-mini
      type: string
    description: The model to use for image generation. One of `dall-e-2`, `dall-e-3`,
      or a GPT image model (`gpt-image-1`, `gpt-image-1-mini`, `gpt-image-1.5`). Defaults
      to `dall-e-2` unless a parameter specific to the GPT image models is used.
    nullable: true
  moderation:
    default: auto
    description: Control the content-moderation level for images generated by the
      GPT image models. Must be either `low` for less restrictive filtering or `auto`
      (default value).
    enum:
    - low
    - auto
    example: low
    nullable: true
    type: string
  n:
    default: 1
    description: The number of images to generate. Must be between 1 and 10. For `dall-e-3`,
      only `n=1` is supported.
    example: 1
    maximum: 10
    minimum: 1
    nullable: true
    type: integer
  output_compression:
    default: 100
    description: The compression level (0-100%) for the generated images. This parameter
      is only supported for the GPT image models with the `webp` or `jpeg` output
      formats, and defaults to 100.
    example: 100
    nullable: true
    type: integer
  output_format:
    default: png
    description: The format in which the generated images are returned. This parameter
      is only supported for the GPT image models. Must be one of `png`, `jpeg`, or
      `webp`.
    enum:
    - png
    - jpeg
    - webp
    example: png
    nullable: true
    type: string
  partial_images:
    $ref: partial_images.yaml
  prompt:
    description: A text description of the desired image(s). The maximum length is
      32000 characters for the GPT image models, 1000 characters for `dall-e-2` and
      4000 characters for `dall-e-3`.
    example: A cute baby sea otter
    type: string
  quality:
    default: auto
    description: 'The quality of the image that will be generated.


      - `auto` (default value) will automatically select the best quality for the
      given model.

      - `high`, `medium` and `low` are supported for the GPT image models.

      - `hd` and `standard` are supported for `dall-e-3`.

      - `standard` is the only option for `dall-e-2`.

      '
    enum:
    - standard
    - hd
    - low
    - medium
    - high
    - auto
    example: medium
    nullable: true
    type: string
  response_format:
    default: url
    description: The format in which generated images with `dall-e-2` and `dall-e-3`
      are returned. Must be one of `url` or `b64_json`. URLs are only valid for 60
      minutes after the image has been generated. This parameter isn't supported for
      the GPT image models, which always return base64-encoded images.
    enum:
    - url
    - b64_json
    example: url
    nullable: true
    type: string
  size:
    default: auto
    description: The size of the generated images. Must be one of `1024x1024`, `1536x1024`
      (landscape), `1024x1536` (portrait), or `auto` (default value) for the GPT image
      models, one of `256x256`, `512x512`, or `1024x1024` for `dall-e-2`, and one
      of `1024x1024`, `1792x1024`, or `1024x1792` for `dall-e-3`.
    enum:
    - auto
    - 1024x1024
    - 1536x1024
    - 1024x1536
    - 256x256
    - 512x512
    - 1792x1024
    - 1024x1792
    example: 1024x1024
    nullable: true
    type: string
  stream:
    default: false
    description: 'Generate the image in streaming mode. Defaults to `false`. See the

      [Image generation guide](https://platform.openai.com/docs/guides/image-generation)
      for more information.

      This parameter is only supported for the GPT image models.

      '
    example: false
    nullable: true
    type: boolean
  style:
    default: vivid
    description: The style of the generated images. This parameter is only supported
      for `dall-e-3`. Must be one of `vivid` or `natural`. Vivid causes the model
      to lean towards generating hyper-real and dramatic images. Natural causes the
      model to produce more natural, less hyper-real looking images.
    enum:
    - vivid
    - natural
    example: vivid
    nullable: true
    type: string
  user:
    description: 'A unique identifier representing your end-user, which can help OpenAI
      to monitor and detect abuse. [Learn more](https://platform.openai.com/docs/guides/safety-best-practices#end-user-ids).

      '
    example: user-1234
    type: string
required:
- prompt
