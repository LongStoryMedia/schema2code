$schema: http://json-schema.org/draft-07/schema#
title: FineTuningIntegration
type: object
properties:
  type:
    description: The type of the integration being enabled for the fine-tuning job
    enum:
    - wandb
    type: string
  wandb:
    description: 'The settings for your integration with Weights and Biases. This
      payload specifies the project that

      metrics will be sent to. Optionally, you can set an explicit display name for
      your run, add tags

      to your run, and set a default entity (team, username, etc) to be associated
      with your run.

      '
    properties:
      entity:
        anyOf:
        - description: 'The entity to use for the run. This allows you to set the
            team or username of the WandB user that you would

            like associated with the run. If not set, the default entity for the registered
            WandB API key is used.

            '
          type: string
        - type: 'null'
      name:
        anyOf:
        - description: 'A display name to set for the run. If not set, we will use
            the Job ID as the name.

            '
          type: string
        - type: 'null'
      project:
        description: 'The name of the project that the new run will be created under.

          '
        example: my-wandb-project
        type: string
      tags:
        description: 'A list of tags to be attached to the newly created run. These
          tags are passed through directly to WandB. Some

          default tags are generated by OpenAI: "openai/finetune", "openai/{base-model}",
          "openai/{ftjob-abcdef}".

          '
        items:
          example: custom-tag
          type: string
        type: array
    required:
    - project
    type: object
required:
- type
- wandb
