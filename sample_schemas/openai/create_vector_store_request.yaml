$schema: http://json-schema.org/draft-07/schema#
title: CreateVectorStoreRequest
type: object
properties:
  chunking_strategy:
    $ref: chunking_strategy_request_param.yaml
  description:
    description: A description for the vector store. Can be used to describe the vector
      store's purpose.
    type: string
  expires_after:
    $ref: vector_store_expiration_after.yaml
  file_ids:
    description: A list of [File](https://platform.openai.com/docs/api-reference/files)
      IDs that the vector store should use. Useful for tools like `file_search` that
      can access files.
    items:
      type: string
    maxItems: 500
    type: array
  metadata:
    $ref: metadata.yaml
  name:
    description: The name of the vector store.
    type: string
additionalProperties: false
