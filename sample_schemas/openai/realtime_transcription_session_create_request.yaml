$schema: http://json-schema.org/draft-07/schema#
title: RealtimeTranscriptionSessionCreateRequest
description: Realtime transcription session object configuration.
type: object
properties:
  include:
    description: 'The set of items to include in the transcription. Current available
      items are:

      `item.input_audio_transcription.logprobs`

      '
    items:
      enum:
      - item.input_audio_transcription.logprobs
      type: string
    type: array
  input_audio_format:
    default: pcm16
    description: 'The format of input audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      For `pcm16`, input audio must be 16-bit PCM at a 24kHz sample rate,

      single channel (mono), and little-endian byte order.

      '
    enum:
    - pcm16
    - g711_ulaw
    - g711_alaw
    type: string
  input_audio_noise_reduction:
    description: 'Configuration for input audio noise reduction. This can be set to
      `null` to turn off.

      Noise reduction filters audio added to the input audio buffer before it is sent
      to VAD and the model.

      Filtering the audio can improve VAD and turn detection accuracy (reducing false
      positives) and model performance by improving perception of the input audio.

      '
    properties:
      type:
        $ref: noise_reduction_type.yaml
    type: object
  input_audio_transcription:
    $ref: audio_transcription.yaml
    description: 'Configuration for input audio transcription. The client can optionally
      set the language and prompt for transcription, these offer additional guidance
      to the transcription service.

      '
  turn_detection:
    description: 'Configuration for turn detection. Can be set to `null` to turn off.
      Server VAD means that the model will detect the start and end of speech based
      on audio volume and respond at the end of user speech.

      '
    properties:
      prefix_padding_ms:
        description: 'Amount of audio to include before the VAD detected speech (in

          milliseconds). Defaults to 300ms.

          '
        type: integer
      silence_duration_ms:
        description: 'Duration of silence to detect speech stop (in milliseconds).
          Defaults

          to 500ms. With shorter values the model will respond more quickly,

          but may jump in on short pauses from the user.

          '
        type: integer
      threshold:
        description: 'Activation threshold for VAD (0.0 to 1.0), this defaults to
          0.5. A

          higher threshold will require louder audio to activate the model, and

          thus might perform better in noisy environments.

          '
        type: number
      type:
        description: 'Type of turn detection. Only `server_vad` is currently supported
          for transcription sessions.

          '
        enum:
        - server_vad
        type: string
    type: object
