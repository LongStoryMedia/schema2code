$schema: http://json-schema.org/draft-07/schema#
title: MCPTool
description: 'Give the model access to additional tools via remote Model Context Protocol

  (MCP) servers. [Learn more about MCP](https://platform.openai.com/docs/guides/tools-remote-mcp).

  '
type: object
properties:
  allowed_tools:
    anyOf:
    - anyOf:
      - description: A string array of allowed tool names
        items:
          type: string
        title: MCP allowed tools
        type: array
      - $ref: mcp_tool_filter.yaml
      description: 'List of allowed tool names or a filter object.

        '
    - type: 'null'
  authorization:
    description: 'An OAuth access token that can be used with a remote MCP server,
      either

      with a custom MCP server URL or a service connector. Your application

      must handle the OAuth authorization flow and provide the token here.

      '
    type: string
  connector_id:
    description: 'Identifier for service connectors, like those available in ChatGPT.
      One of

      `server_url` or `connector_id` must be provided. Learn more about service

      connectors [here](https://platform.openai.com/docs/guides/tools-remote-mcp#connectors).


      Currently supported `connector_id` values are:


      - Dropbox: `connector_dropbox`

      - Gmail: `connector_gmail`

      - Google Calendar: `connector_googlecalendar`

      - Google Drive: `connector_googledrive`

      - Microsoft Teams: `connector_microsoftteams`

      - Outlook Calendar: `connector_outlookcalendar`

      - Outlook Email: `connector_outlookemail`

      - SharePoint: `connector_sharepoint`

      '
    enum:
    - connector_dropbox
    - connector_gmail
    - connector_googlecalendar
    - connector_googledrive
    - connector_microsoftteams
    - connector_outlookcalendar
    - connector_outlookemail
    - connector_sharepoint
    type: string
  headers:
    anyOf:
    - additionalProperties:
        type: string
      description: 'Optional HTTP headers to send to the MCP server. Use for authentication

        or other purposes.

        '
      type: object
    - type: 'null'
  require_approval:
    anyOf:
    - anyOf:
      - additionalProperties: false
        description: 'Specify which of the MCP server''s tools require approval. Can
          be

          `always`, `never`, or a filter object associated with tools

          that require approval.

          '
        properties:
          always:
            $ref: mcp_tool_filter.yaml
          never:
            $ref: mcp_tool_filter.yaml
        title: MCP tool approval filter
        type: object
      - description: 'Specify a single approval policy for all tools. One of `always`
          or

          `never`. When set to `always`, all tools will require approval. When

          set to `never`, all tools will not require approval.

          '
        enum:
        - always
        - never
        title: MCP tool approval setting
        type: string
      default: always
      description: Specify which of the MCP server's tools require approval.
    - type: 'null'
  server_description:
    description: 'Optional description of the MCP server, used to provide more context.

      '
    type: string
  server_label:
    description: 'A label for this MCP server, used to identify it in tool calls.

      '
    type: string
  server_url:
    description: 'The URL for the MCP server. One of `server_url` or `connector_id`
      must be

      provided.

      '
    type: string
  type:
    description: The type of the MCP tool. Always `mcp`.
    enum:
    - mcp
    type: string
required:
- type
- server_label
