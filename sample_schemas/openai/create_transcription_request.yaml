$schema: http://json-schema.org/draft-07/schema#
title: CreateTranscriptionRequest
type: object
properties:
  chunking_strategy:
    $ref: transcription_chunking_strategy.yaml
  file:
    description: 'The audio file object (not file name) to transcribe, in one of these
      formats: flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, or webm.

      '
    format: binary
    type: string
  include:
    description: 'Additional information to include in the transcription response.

      `logprobs` will return the log probabilities of the tokens in the

      response to understand the model''s confidence in the transcription.

      `logprobs` only works with response_format set to `json` and only with

      the models `gpt-4o-transcribe`, `gpt-4o-mini-transcribe`, and `gpt-4o-mini-transcribe-2025-12-15`.
      This field is not supported when using `gpt-4o-transcribe-diarize`.

      '
    items:
      $ref: transcription_include.yaml
    type: array
  known_speaker_names:
    description: 'Optional list of speaker names that correspond to the audio samples
      provided in `known_speaker_references[]`. Each entry should be a short identifier
      (for example `customer` or `agent`). Up to 4 speakers are supported.

      '
    items:
      type: string
    maxItems: 4
    type: array
  known_speaker_references:
    description: 'Optional list of audio samples (as [data URLs](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/Data_URLs))
      that contain known speaker references matching `known_speaker_names[]`. Each
      sample must be between 2 and 10 seconds, and can use any of the same input audio
      formats supported by `file`.

      '
    items:
      type: string
    maxItems: 4
    type: array
  language:
    description: 'The language of the input audio. Supplying the input language in
      [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) (e.g. `en`)
      format will improve accuracy and latency.

      '
    type: string
  model:
    anyOf:
    - type: string
    - enum:
      - whisper-1
      - gpt-4o-transcribe
      - gpt-4o-mini-transcribe
      - gpt-4o-mini-transcribe-2025-12-15
      - gpt-4o-transcribe-diarize
      type: string
    description: 'ID of the model to use. The options are `gpt-4o-transcribe`, `gpt-4o-mini-transcribe`,
      `gpt-4o-mini-transcribe-2025-12-15`, `whisper-1` (which is powered by our open
      source Whisper V2 model), and `gpt-4o-transcribe-diarize`.

      '
    example: gpt-4o-transcribe
  prompt:
    description: 'An optional text to guide the model''s style or continue a previous
      audio segment. The [prompt](https://platform.openai.com/docs/guides/speech-to-text#prompting)
      should match the audio language. This field is not supported when using `gpt-4o-transcribe-diarize`.

      '
    type: string
  response_format:
    $ref: audio_response_format.yaml
  stream:
    anyOf:
    - default: false
      description: 'If set to true, the model response data will be streamed to the
        client

        as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).

        See the [Streaming section of the Speech-to-Text guide](https://platform.openai.com/docs/guides/speech-to-text?lang=curl#streaming-transcriptions)

        for more information.


        Note: Streaming is not supported for the `whisper-1` model and will be ignored.

        '
      type: boolean
    - type: 'null'
  temperature:
    default: 0
    description: 'The sampling temperature, between 0 and 1. Higher values like 0.8
      will make the output more random, while lower values like 0.2 will make it more
      focused and deterministic. If set to 0, the model will use [log probability](https://en.wikipedia.org/wiki/Log_probability)
      to automatically increase the temperature until certain thresholds are hit.

      '
    type: number
  timestamp_granularities:
    default:
    - segment
    description: 'The timestamp granularities to populate for this transcription.
      `response_format` must be set `verbose_json` to use timestamp granularities.
      Either or both of these options are supported: `word`, or `segment`. Note: There
      is no additional latency for segment timestamps, but generating word timestamps
      incurs additional latency.

      This option is not available for `gpt-4o-transcribe-diarize`.

      '
    items:
      enum:
      - word
      - segment
      type: string
    type: array
required:
- file
- model
additionalProperties: false
