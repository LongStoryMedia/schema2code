$schema: http://json-schema.org/draft-07/schema#
title: EvalItem
description: 'A message input to the model with a role indicating instruction following

  hierarchy. Instructions given with the `developer` or `system` role take

  precedence over instructions given with the `user` role. Messages with the

  `assistant` role are presumed to have been generated by the model in previous

  interactions.

  '
type: object
properties:
  content:
    $ref: eval_item_content.yaml
  role:
    description: 'The role of the message input. One of `user`, `assistant`, `system`,
      or

      `developer`.

      '
    enum:
    - user
    - assistant
    - system
    - developer
    type: string
  type:
    description: 'The type of the message input. Always `message`.

      '
    enum:
    - message
    type: string
required:
- role
- content
