$schema: http://json-schema.org/draft-07/schema#
title: CreateAssistantRequest
type: object
properties:
  description:
    anyOf:
    - description: 'The description of the assistant. The maximum length is 512 characters.

        '
      maxLength: 512
      type: string
    - type: 'null'
  instructions:
    anyOf:
    - description: 'The system instructions that the assistant uses. The maximum length
        is 256,000 characters.

        '
      maxLength: 256000
      type: string
    - type: 'null'
  metadata:
    $ref: metadata.yaml
  model:
    anyOf:
    - type: string
    - $ref: assistant_supported_models.yaml
    description: 'ID of the model to use. You can use the [List models](https://platform.openai.com/docs/api-reference/models/list)
      API to see all of your available models, or see our [Model overview](https://platform.openai.com/docs/models)
      for descriptions of them.

      '
    example: gpt-4o
  name:
    anyOf:
    - description: 'The name of the assistant. The maximum length is 256 characters.

        '
      maxLength: 256
      type: string
    - type: 'null'
  reasoning_effort:
    $ref: reasoning_effort.yaml
  response_format:
    anyOf:
    - $ref: assistants_api_response_format_option.yaml
    - type: 'null'
  temperature:
    anyOf:
    - default: 1
      description: 'What sampling temperature to use, between 0 and 2. Higher values
        like 0.8 will make the output more random, while lower values like 0.2 will
        make it more focused and deterministic.

        '
      example: 1
      maximum: 2
      minimum: 0
      type: number
    - type: 'null'
  tool_resources:
    anyOf:
    - description: 'A set of resources that are used by the assistant''s tools. The
        resources are specific to the type of tool. For example, the `code_interpreter`
        tool requires a list of file IDs, while the `file_search` tool requires a
        list of vector store IDs.

        '
      properties:
        code_interpreter:
          properties:
            file_ids:
              default: []
              description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
                IDs made available to the `code_interpreter` tool. There can be a
                maximum of 20 files associated with the tool.

                '
              items:
                type: string
              maxItems: 20
              type: array
          type: object
        file_search:
          anyOf:
          - required:
            - vector_store_ids
          - required:
            - vector_stores
          properties:
            vector_store_ids:
              description: 'The [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                attached to this assistant. There can be a maximum of 1 vector store
                attached to the assistant.

                '
              items:
                type: string
              maxItems: 1
              type: array
            vector_stores:
              description: 'A helper to create a [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                with file_ids and attach it to this assistant. There can be a maximum
                of 1 vector store attached to the assistant.

                '
              items:
                properties:
                  chunking_strategy:
                    anyOf:
                    - additionalProperties: false
                      description: The default strategy. This strategy currently uses
                        a `max_chunk_size_tokens` of `800` and `chunk_overlap_tokens`
                        of `400`.
                      properties:
                        type:
                          description: Always `auto`.
                          enum:
                          - auto
                          type: string
                      required:
                      - type
                      title: Auto Chunking Strategy
                      type: object
                    - additionalProperties: false
                      properties:
                        static:
                          additionalProperties: false
                          properties:
                            chunk_overlap_tokens:
                              description: 'The number of tokens that overlap between
                                chunks. The default value is `400`.


                                Note that the overlap must not exceed half of `max_chunk_size_tokens`.

                                '
                              type: integer
                            max_chunk_size_tokens:
                              description: The maximum number of tokens in each chunk.
                                The default value is `800`. The minimum value is `100`
                                and the maximum value is `4096`.
                              maximum: 4096
                              minimum: 100
                              type: integer
                          required:
                          - max_chunk_size_tokens
                          - chunk_overlap_tokens
                          type: object
                        type:
                          description: Always `static`.
                          enum:
                          - static
                          type: string
                      required:
                      - type
                      - static
                      title: Static Chunking Strategy
                      type: object
                    description: The chunking strategy used to chunk the file(s).
                      If not set, will use the `auto` strategy.
                    discriminator:
                      propertyName: type
                    type: object
                  file_ids:
                    description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
                      IDs to add to the vector store. There can be a maximum of 10000
                      files in a vector store.

                      '
                    items:
                      type: string
                    maxItems: 10000
                    type: array
                  metadata:
                    $ref: metadata.yaml
                type: object
              maxItems: 1
              type: array
          type: object
      type: object
    - type: 'null'
  tools:
    default: []
    description: 'A list of tool enabled on the assistant. There can be a maximum
      of 128 tools per assistant. Tools can be of types `code_interpreter`, `file_search`,
      or `function`.

      '
    items:
      $ref: assistant_tool.yaml
    maxItems: 128
    type: array
  top_p:
    anyOf:
    - default: 1
      description: 'An alternative to sampling with temperature, called nucleus sampling,
        where the model considers the results of the tokens with top_p probability
        mass. So 0.1 means only the tokens comprising the top 10% probability mass
        are considered.


        We generally recommend altering this or temperature but not both.

        '
      example: 1
      maximum: 1
      minimum: 0
      type: number
    - type: 'null'
required:
- model
additionalProperties: false
