$schema: http://json-schema.org/draft-07/schema#
title: FunctionShellCallOutput
description: The output of a shell tool call that was emitted.
type: object
properties:
  call_id:
    description: The unique ID of the shell tool call generated by the model.
    type: string
  created_by:
    description: The identifier of the actor that created the item.
    type: string
  id:
    description: The unique ID of the shell call output. Populated when this item
      is returned via API.
    type: string
  max_output_length:
    anyOf:
    - description: The maximum length of the shell command output. This is generated
        by the model and should be passed back with the raw output.
      type: integer
    - type: 'null'
  output:
    description: An array of shell call output contents
    items:
      $ref: function_shell_call_output_content.yaml
    type: array
  type:
    default: shell_call_output
    description: The type of the shell call output. Always `shell_call_output`.
    enum:
    - shell_call_output
    type: string
required:
- type
- id
- call_id
- output
- max_output_length
