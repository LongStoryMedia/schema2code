$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionRequestUserMessage
description: 'Messages sent by an end user, containing prompts or additional context

  information.

  '
type: object
properties:
  content:
    anyOf:
    - description: The text contents of the message.
      title: Text content
      type: string
    - description: An array of content parts with a defined type. Supported options
        differ based on the [model](https://platform.openai.com/docs/models) being
        used to generate the response. Can contain text, image, or audio inputs.
      items:
        $ref: chat_completion_request_user_message_content_part.yaml
      minItems: 1
      title: Array of content parts
      type: array
    description: 'The contents of the user message.

      '
  name:
    description: An optional name for the participant. Provides the model information
      to differentiate between participants of the same role.
    type: string
  role:
    description: The role of the messages author, in this case `user`.
    enum:
    - user
    type: string
required:
- content
- role
