$schema: http://json-schema.org/draft-07/schema#
title: FineTuningJobCheckpoint
description: 'The `fine_tuning.job.checkpoint` object represents a model checkpoint
  for a fine-tuning job that is ready to use.

  '
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the checkpoint was created.
    type: integer
  fine_tuned_model_checkpoint:
    description: The name of the fine-tuned checkpoint model that is created.
    type: string
  fine_tuning_job_id:
    description: The name of the fine-tuning job that this checkpoint was created
      from.
    type: string
  id:
    description: The checkpoint identifier, which can be referenced in the API endpoints.
    type: string
  metrics:
    description: Metrics at the step number during the fine-tuning job.
    properties:
      full_valid_loss:
        type: number
      full_valid_mean_token_accuracy:
        type: number
      step:
        type: number
      train_loss:
        type: number
      train_mean_token_accuracy:
        type: number
      valid_loss:
        type: number
      valid_mean_token_accuracy:
        type: number
    type: object
  object:
    description: The object type, which is always "fine_tuning.job.checkpoint".
    enum:
    - fine_tuning.job.checkpoint
    type: string
  step_number:
    description: The step number that the checkpoint was created at.
    type: integer
required:
- created_at
- fine_tuning_job_id
- fine_tuned_model_checkpoint
- id
- metrics
- object
- step_number
