$schema: http://json-schema.org/draft-07/schema#
title: VectorStoreObject
description: A vector store is a collection of processed files can be used by the
  `file_search` tool.
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the vector store was created.
    type: integer
  expires_after:
    $ref: vector_store_expiration_after.yaml
  expires_at:
    anyOf:
    - description: The Unix timestamp (in seconds) for when the vector store will
        expire.
      type: integer
    - type: 'null'
  file_counts:
    properties:
      cancelled:
        description: The number of files that were cancelled.
        type: integer
      completed:
        description: The number of files that have been successfully processed.
        type: integer
      failed:
        description: The number of files that have failed to process.
        type: integer
      in_progress:
        description: The number of files that are currently being processed.
        type: integer
      total:
        description: The total number of files.
        type: integer
    required:
    - in_progress
    - completed
    - failed
    - cancelled
    - total
    type: object
  id:
    description: The identifier, which can be referenced in API endpoints.
    type: string
  last_active_at:
    anyOf:
    - description: The Unix timestamp (in seconds) for when the vector store was last
        active.
      type: integer
    - type: 'null'
  metadata:
    $ref: metadata.yaml
  name:
    description: The name of the vector store.
    type: string
  object:
    description: The object type, which is always `vector_store`.
    enum:
    - vector_store
    type: string
  status:
    description: The status of the vector store, which can be either `expired`, `in_progress`,
      or `completed`. A status of `completed` indicates that the vector store is ready
      for use.
    enum:
    - expired
    - in_progress
    - completed
    type: string
  usage_bytes:
    description: The total number of bytes used by the files in the vector store.
    type: integer
required:
- id
- object
- usage_bytes
- created_at
- status
- last_active_at
- name
- file_counts
- metadata
