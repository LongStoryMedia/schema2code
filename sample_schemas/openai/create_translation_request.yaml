$schema: http://json-schema.org/draft-07/schema#
title: CreateTranslationRequest
type: object
properties:
  file:
    description: 'The audio file object (not file name) translate, in one of these
      formats: flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, or webm.

      '
    format: binary
    type: string
  model:
    anyOf:
    - type: string
    - enum:
      - whisper-1
      type: string
    description: 'ID of the model to use. Only `whisper-1` (which is powered by our
      open source Whisper V2 model) is currently available.

      '
    example: whisper-1
  prompt:
    description: 'An optional text to guide the model''s style or continue a previous
      audio segment. The [prompt](https://platform.openai.com/docs/guides/speech-to-text#prompting)
      should be in English.

      '
    type: string
  response_format:
    default: json
    description: 'The format of the output, in one of these options: `json`, `text`,
      `srt`, `verbose_json`, or `vtt`.

      '
    enum:
    - json
    - text
    - srt
    - verbose_json
    - vtt
    type: string
  temperature:
    default: 0
    description: 'The sampling temperature, between 0 and 1. Higher values like 0.8
      will make the output more random, while lower values like 0.2 will make it more
      focused and deterministic. If set to 0, the model will use [log probability](https://en.wikipedia.org/wiki/Log_probability)
      to automatically increase the temperature until certain thresholds are hit.

      '
    type: number
required:
- file
- model
additionalProperties: false
