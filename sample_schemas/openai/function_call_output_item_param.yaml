$schema: http://json-schema.org/draft-07/schema#
title: FunctionCallOutputItemParam
description: The output of a function tool call.
type: object
properties:
  call_id:
    description: The unique ID of the function tool call generated by the model.
    maxLength: 64
    minLength: 1
    type: string
  id:
    anyOf:
    - description: The unique ID of the function tool call output. Populated when
        this item is returned via API.
      example: fc_123
      type: string
    - type: 'null'
  output:
    anyOf:
    - description: A JSON string of the output of the function tool call.
      maxLength: 10485760
      type: string
    - description: An array of content outputs (text, image, file) for the function
        tool call.
      items:
        anyOf:
        - $ref: input_text_content_param.yaml
        - $ref: input_image_content_param_auto_param.yaml
        - $ref: input_file_content_param.yaml
        description: A piece of message content, such as text, an image, or a file.
        discriminator:
          propertyName: type
      type: array
    description: Text, image, or file output of the function tool call.
  status:
    anyOf:
    - $ref: function_call_item_status.yaml
      description: The status of the item. One of `in_progress`, `completed`, or `incomplete`.
        Populated when items are returned via API.
    - type: 'null'
  type:
    default: function_call_output
    description: The type of the function tool call output. Always `function_call_output`.
    enum:
    - function_call_output
    type: string
required:
- call_id
- type
- output
