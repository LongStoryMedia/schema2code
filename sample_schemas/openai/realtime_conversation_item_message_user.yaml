$schema: http://json-schema.org/draft-07/schema#
title: RealtimeConversationItemMessageUser
description: A user message item in a Realtime conversation.
type: object
properties:
  content:
    description: The content of the message.
    items:
      properties:
        audio:
          description: Base64-encoded audio bytes (for `input_audio`), these will
            be parsed as the format specified in the session input audio type configuration.
            This defaults to PCM 16-bit 24kHz mono if not specified.
          type: string
        detail:
          default: auto
          description: The detail level of the image (for `input_image`). `auto` will
            default to `high`.
          enum:
          - auto
          - low
          - high
          type: string
        image_url:
          description: Base64-encoded image bytes (for `input_image`) as a data URI.
            For example `data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...`. Supported
            formats are PNG and JPEG.
          type: string
        text:
          description: The text content (for `input_text`).
          type: string
        transcript:
          description: Transcript of the audio (for `input_audio`). This is not sent
            to the model, but will be attached to the message item for reference.
          type: string
        type:
          description: The content type (`input_text`, `input_audio`, or `input_image`).
          enum:
          - input_text
          - input_audio
          - input_image
          type: string
      type: object
    type: array
  id:
    description: The unique ID of the item. This may be provided by the client or
      generated by the server.
    type: string
  object:
    description: Identifier for the API object being returned - always `realtime.item`.
      Optional when creating a new item.
    enum:
    - realtime.item
    type: string
  role:
    description: The role of the message sender. Always `user`.
    enum:
    - user
    type: string
  status:
    description: The status of the item. Has no effect on the conversation.
    enum:
    - completed
    - incomplete
    - in_progress
    type: string
  type:
    description: The type of the item. Always `message`.
    enum:
    - message
    type: string
required:
- type
- role
- content
