$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionRequestMessageContentPartImage
description: 'Learn about [image inputs](https://platform.openai.com/docs/guides/vision).

  '
type: object
properties:
  image_url:
    properties:
      detail:
        default: auto
        description: Specifies the detail level of the image. Learn more in the [Vision
          guide](https://platform.openai.com/docs/guides/vision#low-or-high-fidelity-image-understanding).
        enum:
        - auto
        - low
        - high
        type: string
      url:
        description: Either a URL of the image or the base64 encoded image data.
        format: uri
        type: string
    required:
    - url
    type: object
  type:
    description: The type of the content part.
    enum:
    - image_url
    type: string
required:
- type
- image_url
