$schema: http://json-schema.org/draft-07/schema#
title: GroupRoleAssignment
description: Role assignment linking a group to a role.
type: object
properties:
  group:
    $ref: group.yaml
  object:
    description: Always `group.role`.
    enum:
    - group.role
    type: string
  role:
    $ref: role.yaml
required:
- object
- group
- role
