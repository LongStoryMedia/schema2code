$schema: http://json-schema.org/draft-07/schema#
title: RealtimeServerEventConversationItemCreated
description: "Returned when a conversation item is created. There are several scenarios\
  \ that produce this event:\n  - The server is generating a Response, which if successful\
  \ will produce\n    either one or two Items, which will be of type `message`\n \
  \   (role `assistant`) or type `function_call`.\n  - The input audio buffer has\
  \ been committed, either by the client or the\n    server (in `server_vad` mode).\
  \ The server will take the content of the\n    input audio buffer and add it to\
  \ a new user message Item.\n  - The client has sent a `conversation.item.create`\
  \ event to add a new Item\n    to the Conversation.\n"
type: object
properties:
  event_id:
    description: The unique ID of the server event.
    type: string
  item:
    $ref: realtime_conversation_item.yaml
  previous_item_id:
    anyOf:
    - description: 'The ID of the preceding item in the Conversation context, allows
        the

        client to understand the order of the conversation. Can be `null` if the

        item has no predecessor.

        '
      type: string
    - type: 'null'
  type:
    const: conversation.item.created
    description: The event type, must be `conversation.item.created`.
required:
- event_id
- type
- item
