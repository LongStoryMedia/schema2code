$schema: http://json-schema.org/draft-07/schema#
title: CompactResponseMethodPublicBody
type: object
properties:
  input:
    anyOf:
    - anyOf:
      - description: A text input to the model, equivalent to a text input with the
          `user` role.
        maxLength: 10485760
        type: string
      - description: A list of one or many input items to the model, containing different
          content types.
        items:
          $ref: input_item.yaml
        type: array
      description: Text, image, or file inputs to the model, used to generate a response
    - type: 'null'
  instructions:
    anyOf:
    - description: 'A system (or developer) message inserted into the model''s context.

        When used along with `previous_response_id`, the instructions from a previous
        response will not be carried over to the next response. This makes it simple
        to swap out system (or developer) messages in new responses.'
      type: string
    - type: 'null'
  model:
    $ref: model_ids_compaction.yaml
  previous_response_id:
    anyOf:
    - description: The unique ID of the previous response to the model. Use this to
        create multi-turn conversations. Learn more about [conversation state](https://platform.openai.com/docs/guides/conversation-state).
        Cannot be used in conjunction with `conversation`.
      example: resp_123
      type: string
    - type: 'null'
required:
- model
