$schema: http://json-schema.org/draft-07/schema#
title: RealtimeConversationItemMessageSystem
description: A system message in a Realtime conversation can be used to provide additional
  context or instructions to the model. This is similar but distinct from the instruction
  prompt provided at the start of a conversation, as system messages can be added
  at any point in the conversation. For major changes to the conversation's behavior,
  use instructions, but for smaller updates (e.g. "the user is now asking about a
  different topic"), use system messages.
type: object
properties:
  content:
    description: The content of the message.
    items:
      properties:
        text:
          description: The text content.
          type: string
        type:
          description: The content type. Always `input_text` for system messages.
          enum:
          - input_text
          type: string
      type: object
    type: array
  id:
    description: The unique ID of the item. This may be provided by the client or
      generated by the server.
    type: string
  object:
    description: Identifier for the API object being returned - always `realtime.item`.
      Optional when creating a new item.
    enum:
    - realtime.item
    type: string
  role:
    description: The role of the message sender. Always `system`.
    enum:
    - system
    type: string
  status:
    description: The status of the item. Has no effect on the conversation.
    enum:
    - completed
    - incomplete
    - in_progress
    type: string
  type:
    description: The type of the item. Always `message`.
    enum:
    - message
    type: string
required:
- type
- role
- content
