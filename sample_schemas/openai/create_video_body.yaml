$schema: http://json-schema.org/draft-07/schema#
title: CreateVideoBody
description: Parameters for creating a new video generation job.
type: object
properties:
  input_reference:
    description: Optional image reference that guides generation.
    format: binary
    type: string
  model:
    $ref: video_model.yaml
    description: 'The video generation model to use (allowed values: sora-2, sora-2-pro).
      Defaults to `sora-2`.'
  prompt:
    description: Text prompt that describes the video to generate.
    maxLength: 32000
    minLength: 1
    type: string
  seconds:
    $ref: video_seconds.yaml
    description: 'Clip duration in seconds (allowed values: 4, 8, 12). Defaults to
      4 seconds.'
  size:
    $ref: video_size.yaml
    description: 'Output resolution formatted as width x height (allowed values: 720x1280,
      1280x720, 1024x1792, 1792x1024). Defaults to 720x1280.'
required:
- prompt
