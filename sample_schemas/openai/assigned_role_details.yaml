$schema: http://json-schema.org/draft-07/schema#
title: AssignedRoleDetails
description: Detailed information about a role assignment entry returned when listing
  assignments.
type: object
properties:
  created_at:
    anyOf:
    - format: int64
      type: integer
    - type: 'null'
    description: When the role was created.
  created_by:
    anyOf:
    - type: string
    - type: 'null'
    description: Identifier of the actor who created the role.
  created_by_user_obj:
    anyOf:
    - additionalProperties: true
      type: object
    - type: 'null'
    description: User details for the actor that created the role, when available.
  description:
    anyOf:
    - type: string
    - type: 'null'
    description: Description of the role.
  id:
    description: Identifier for the role.
    type: string
  metadata:
    anyOf:
    - additionalProperties: true
      type: object
    - type: 'null'
    description: Arbitrary metadata stored on the role.
  name:
    description: Name of the role.
    type: string
  permissions:
    description: Permissions associated with the role.
    items:
      type: string
    type: array
  predefined_role:
    description: Whether the role is predefined by OpenAI.
    type: boolean
  resource_type:
    description: Resource type the role applies to.
    type: string
  updated_at:
    anyOf:
    - format: int64
      type: integer
    - type: 'null'
    description: When the role was last updated.
required:
- id
- name
- permissions
- resource_type
- predefined_role
- description
- created_at
- updated_at
- created_by
- created_by_user_obj
- metadata
