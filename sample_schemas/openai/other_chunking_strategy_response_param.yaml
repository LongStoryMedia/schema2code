$schema: http://json-schema.org/draft-07/schema#
title: OtherChunkingStrategyResponseParam
description: This is returned when the chunking strategy is unknown. Typically, this
  is because the file was indexed before the `chunking_strategy` concept was introduced
  in the API.
type: object
properties:
  type:
    description: Always `other`.
    enum:
    - other
    type: string
required:
- type
additionalProperties: false
