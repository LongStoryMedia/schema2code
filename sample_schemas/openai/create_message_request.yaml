$schema: http://json-schema.org/draft-07/schema#
title: CreateMessageRequest
type: object
properties:
  attachments:
    anyOf:
    - description: A list of files attached to the message, and the tools they should
        be added to.
      items:
        properties:
          file_id:
            description: The ID of the file to attach to the message.
            type: string
          tools:
            description: The tools to add this file to.
            items:
              anyOf:
              - $ref: assistant_tools_code.yaml
              - $ref: assistant_tools_file_search_type_only.yaml
              discriminator:
                propertyName: type
            type: array
        type: object
      required:
      - file_id
      - tools
      type: array
    - type: 'null'
  content:
    anyOf:
    - description: The text contents of the message.
      title: Text content
      type: string
    - description: An array of content parts with a defined type, each can be of type
        `text` or images can be passed with `image_url` or `image_file`. Image types
        are only supported on [Vision-compatible models](https://platform.openai.com/docs/models).
      items:
        anyOf:
        - $ref: message_content_image_file_object.yaml
        - $ref: message_content_image_url_object.yaml
        - $ref: message_request_content_text_object.yaml
        discriminator:
          propertyName: type
      minItems: 1
      title: Array of content parts
      type: array
  metadata:
    $ref: metadata.yaml
  role:
    description: 'The role of the entity that is creating the message. Allowed values
      include:

      - `user`: Indicates the message is sent by an actual user and should be used
      in most cases to represent user-generated messages.

      - `assistant`: Indicates the message is generated by the assistant. Use this
      value to insert messages from the assistant into the conversation.

      '
    enum:
    - user
    - assistant
    type: string
required:
- role
- content
additionalProperties: false
