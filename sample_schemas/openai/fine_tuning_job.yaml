$schema: http://json-schema.org/draft-07/schema#
title: FineTuningJob
description: 'The `fine_tuning.job` object represents a fine-tuning job that has been
  created through the API.

  '
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the fine-tuning job was
      created.
    type: integer
  error:
    anyOf:
    - description: For fine-tuning jobs that have `failed`, this will contain more
        information on the cause of the failure.
      properties:
        code:
          description: A machine-readable error code.
          type: string
        message:
          description: A human-readable error message.
          type: string
        param:
          anyOf:
          - description: The parameter that was invalid, usually `training_file` or
              `validation_file`. This field will be null if the failure was not parameter-specific.
            type: string
          - type: 'null'
      required:
      - code
      - message
      - param
      type: object
    - type: 'null'
  estimated_finish:
    anyOf:
    - description: The Unix timestamp (in seconds) for when the fine-tuning job is
        estimated to finish. The value will be null if the fine-tuning job is not
        running.
      type: integer
    - type: 'null'
  fine_tuned_model:
    anyOf:
    - description: The name of the fine-tuned model that is being created. The value
        will be null if the fine-tuning job is still running.
      type: string
    - type: 'null'
  finished_at:
    anyOf:
    - description: The Unix timestamp (in seconds) for when the fine-tuning job was
        finished. The value will be null if the fine-tuning job is still running.
      type: integer
    - type: 'null'
  hyperparameters:
    description: The hyperparameters used for the fine-tuning job. This value will
      only be returned when running `supervised` jobs.
    properties:
      batch_size:
        anyOf:
        - anyOf:
          - enum:
            - auto
            type: string
          - maximum: 256
            minimum: 1
            type: integer
          default: auto
          description: 'Number of examples in each batch. A larger batch size means
            that model parameters

            are updated less frequently, but with lower variance.

            '
          title: Auto
        - title: Manual
          type: 'null'
      learning_rate_multiplier:
        anyOf:
        - enum:
          - auto
          title: Auto
          type: string
        - exclusiveMinimum: true
          minimum: 0
          type: number
        description: 'Scaling factor for the learning rate. A smaller learning rate
          may be useful to avoid

          overfitting.

          '
      n_epochs:
        anyOf:
        - enum:
          - auto
          title: Auto
          type: string
        - maximum: 50
          minimum: 1
          type: integer
        default: auto
        description: 'The number of epochs to train the model for. An epoch refers
          to one full cycle

          through the training dataset.

          '
    type: object
  id:
    description: The object identifier, which can be referenced in the API endpoints.
    type: string
  integrations:
    anyOf:
    - description: A list of integrations to enable for this fine-tuning job.
      items:
        anyOf:
        - $ref: fine_tuning_integration.yaml
        discriminator:
          propertyName: type
      maxItems: 5
      type: array
    - type: 'null'
  metadata:
    $ref: metadata.yaml
  method:
    $ref: fine_tune_method.yaml
  model:
    description: The base model that is being fine-tuned.
    type: string
  object:
    description: The object type, which is always "fine_tuning.job".
    enum:
    - fine_tuning.job
    type: string
  organization_id:
    description: The organization that owns the fine-tuning job.
    type: string
  result_files:
    description: The compiled results file ID(s) for the fine-tuning job. You can
      retrieve the results with the [Files API](https://platform.openai.com/docs/api-reference/files/retrieve-contents).
    items:
      example: file-abc123
      type: string
    type: array
  seed:
    description: The seed used for the fine-tuning job.
    type: integer
  status:
    description: The current status of the fine-tuning job, which can be either `validating_files`,
      `queued`, `running`, `succeeded`, `failed`, or `cancelled`.
    enum:
    - validating_files
    - queued
    - running
    - succeeded
    - failed
    - cancelled
    type: string
  trained_tokens:
    anyOf:
    - description: The total number of billable tokens processed by this fine-tuning
        job. The value will be null if the fine-tuning job is still running.
      type: integer
    - type: 'null'
  training_file:
    description: The file ID used for training. You can retrieve the training data
      with the [Files API](https://platform.openai.com/docs/api-reference/files/retrieve-contents).
    type: string
  validation_file:
    anyOf:
    - description: The file ID used for validation. You can retrieve the validation
        results with the [Files API](https://platform.openai.com/docs/api-reference/files/retrieve-contents).
      type: string
    - type: 'null'
required:
- created_at
- error
- finished_at
- fine_tuned_model
- hyperparameters
- id
- model
- object
- organization_id
- result_files
- status
- trained_tokens
- training_file
- validation_file
- seed
