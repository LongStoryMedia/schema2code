$schema: http://json-schema.org/draft-07/schema#
title: InviteRequest
type: object
properties:
  email:
    description: Send an email to this address
    type: string
  projects:
    description: An array of projects to which membership is granted at the same time
      the org invite is accepted. If omitted, the user will be invited to the default
      project for compatibility with legacy behavior.
    items:
      properties:
        id:
          description: Project's public ID
          type: string
        role:
          description: Project membership role
          enum:
          - member
          - owner
          type: string
      required:
      - id
      - role
      type: object
    type: array
  role:
    description: '`owner` or `reader`'
    enum:
    - reader
    - owner
    type: string
required:
- email
- role
