$schema: http://json-schema.org/draft-07/schema#
title: ModifyAssistantRequest
type: object
properties:
  description:
    anyOf:
    - description: 'The description of the assistant. The maximum length is 512 characters.

        '
      maxLength: 512
      type: string
    - type: 'null'
  instructions:
    anyOf:
    - description: 'The system instructions that the assistant uses. The maximum length
        is 256,000 characters.

        '
      maxLength: 256000
      type: string
    - type: 'null'
  metadata:
    $ref: metadata.yaml
  model:
    anyOf:
    - type: string
    - $ref: assistant_supported_models.yaml
    description: 'ID of the model to use. You can use the [List models](https://platform.openai.com/docs/api-reference/models/list)
      API to see all of your available models, or see our [Model overview](https://platform.openai.com/docs/models)
      for descriptions of them.

      '
  name:
    anyOf:
    - description: 'The name of the assistant. The maximum length is 256 characters.

        '
      maxLength: 256
      type: string
    - type: 'null'
  reasoning_effort:
    $ref: reasoning_effort.yaml
  response_format:
    anyOf:
    - $ref: assistants_api_response_format_option.yaml
    - type: 'null'
  temperature:
    anyOf:
    - default: 1
      description: 'What sampling temperature to use, between 0 and 2. Higher values
        like 0.8 will make the output more random, while lower values like 0.2 will
        make it more focused and deterministic.

        '
      example: 1
      maximum: 2
      minimum: 0
      type: number
    - type: 'null'
  tool_resources:
    anyOf:
    - description: 'A set of resources that are used by the assistant''s tools. The
        resources are specific to the type of tool. For example, the `code_interpreter`
        tool requires a list of file IDs, while the `file_search` tool requires a
        list of vector store IDs.

        '
      properties:
        code_interpreter:
          properties:
            file_ids:
              default: []
              description: 'Overrides the list of [file](https://platform.openai.com/docs/api-reference/files)
                IDs made available to the `code_interpreter` tool. There can be a
                maximum of 20 files associated with the tool.

                '
              items:
                type: string
              maxItems: 20
              type: array
          type: object
        file_search:
          properties:
            vector_store_ids:
              description: 'Overrides the [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                attached to this assistant. There can be a maximum of 1 vector store
                attached to the assistant.

                '
              items:
                type: string
              maxItems: 1
              type: array
          type: object
      type: object
    - type: 'null'
  tools:
    default: []
    description: 'A list of tool enabled on the assistant. There can be a maximum
      of 128 tools per assistant. Tools can be of types `code_interpreter`, `file_search`,
      or `function`.

      '
    items:
      $ref: assistant_tool.yaml
    maxItems: 128
    type: array
  top_p:
    anyOf:
    - default: 1
      description: 'An alternative to sampling with temperature, called nucleus sampling,
        where the model considers the results of the tokens with top_p probability
        mass. So 0.1 means only the tokens comprising the top 10% probability mass
        are considered.


        We generally recommend altering this or temperature but not both.

        '
      example: 1
      maximum: 1
      minimum: 0
      type: number
    - type: 'null'
additionalProperties: false
