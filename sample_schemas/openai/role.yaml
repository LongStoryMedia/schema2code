$schema: http://json-schema.org/draft-07/schema#
title: Role
description: Details about a role that can be assigned through the public Roles API.
type: object
properties:
  description:
    anyOf:
    - type: string
    - type: 'null'
    description: Optional description of the role.
  id:
    description: Identifier for the role.
    type: string
  name:
    description: Unique name for the role.
    type: string
  object:
    description: Always `role`.
    enum:
    - role
    type: string
  permissions:
    description: Permissions granted by the role.
    items:
      type: string
    type: array
  predefined_role:
    description: Whether the role is predefined and managed by OpenAI.
    type: boolean
  resource_type:
    description: Resource type the role is bound to (for example `api.organization`
      or `api.project`).
    type: string
required:
- object
- id
- name
- description
- permissions
- resource_type
- predefined_role
