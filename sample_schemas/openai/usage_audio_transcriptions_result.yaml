$schema: http://json-schema.org/draft-07/schema#
title: UsageAudioTranscriptionsResult
description: The aggregated audio transcriptions usage details of the specific time
  bucket.
type: object
properties:
  api_key_id:
    anyOf:
    - description: When `group_by=api_key_id`, this field provides the API key ID
        of the grouped usage result.
      type: string
    - type: 'null'
  model:
    anyOf:
    - description: When `group_by=model`, this field provides the model name of the
        grouped usage result.
      type: string
    - type: 'null'
  num_model_requests:
    description: The count of requests made to the model.
    type: integer
  object:
    enum:
    - organization.usage.audio_transcriptions.result
    type: string
  project_id:
    anyOf:
    - description: When `group_by=project_id`, this field provides the project ID
        of the grouped usage result.
      type: string
    - type: 'null'
  seconds:
    description: The number of seconds processed.
    type: integer
  user_id:
    anyOf:
    - description: When `group_by=user_id`, this field provides the user ID of the
        grouped usage result.
      type: string
    - type: 'null'
required:
- object
- seconds
- num_model_requests
