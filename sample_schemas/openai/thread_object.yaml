$schema: http://json-schema.org/draft-07/schema#
title: ThreadObject
description: Represents a thread that contains [messages](https://platform.openai.com/docs/api-reference/messages).
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the thread was created.
    type: integer
  id:
    description: The identifier, which can be referenced in API endpoints.
    type: string
  metadata:
    $ref: metadata.yaml
  object:
    description: The object type, which is always `thread`.
    enum:
    - thread
    type: string
  tool_resources:
    anyOf:
    - description: 'A set of resources that are made available to the assistant''s
        tools in this thread. The resources are specific to the type of tool. For
        example, the `code_interpreter` tool requires a list of file IDs, while the
        `file_search` tool requires a list of vector store IDs.

        '
      properties:
        code_interpreter:
          properties:
            file_ids:
              default: []
              description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
                IDs made available to the `code_interpreter` tool. There can be a
                maximum of 20 files associated with the tool.

                '
              items:
                type: string
              maxItems: 20
              type: array
          type: object
        file_search:
          properties:
            vector_store_ids:
              description: 'The [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                attached to this thread. There can be a maximum of 1 vector store
                attached to the thread.

                '
              items:
                type: string
              maxItems: 1
              type: array
          type: object
      type: object
    - type: 'null'
required:
- id
- object
- created_at
- tool_resources
- metadata
