$schema: http://json-schema.org/draft-07/schema#
title: CreateContainerBody
type: object
properties:
  expires_after:
    description: Container expiration time in seconds relative to the 'anchor' time.
    properties:
      anchor:
        description: Time anchor for the expiration time. Currently only 'last_active_at'
          is supported.
        enum:
        - last_active_at
        type: string
      minutes:
        type: integer
    required:
    - anchor
    - minutes
    type: object
  file_ids:
    description: IDs of files to copy to the container.
    items:
      type: string
    type: array
  memory_limit:
    description: Optional memory limit for the container. Defaults to "1g".
    enum:
    - 1g
    - 4g
    - 16g
    - 64g
    type: string
  name:
    description: Name of the container to create.
    type: string
required:
- name
