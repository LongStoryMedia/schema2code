$schema: http://json-schema.org/draft-07/schema#
title: RealtimeServerEventOutputAudioBufferStopped
description: '**WebRTC/SIP Only:** Emitted when the output audio buffer has been completely
  drained on the server,

  and no more audio is forthcoming. This event is emitted after the full response

  data has been sent to the client (`response.done`).

  [Learn more](https://platform.openai.com/docs/guides/realtime-conversations#client-and-server-events-for-audio-in-webrtc).

  '
type: object
properties:
  event_id:
    description: The unique ID of the server event.
    type: string
  response_id:
    description: The unique ID of the response that produced the audio.
    type: string
  type:
    const: output_audio_buffer.stopped
    description: The event type, must be `output_audio_buffer.stopped`.
required:
- event_id
- type
- response_id
