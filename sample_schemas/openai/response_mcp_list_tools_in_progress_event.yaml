$schema: http://json-schema.org/draft-07/schema#
title: ResponseMCPListToolsInProgressEvent
description: 'Emitted when the system is in the process of retrieving the list of
  available MCP tools.

  '
type: object
properties:
  item_id:
    description: The ID of the MCP tool call item that is being processed.
    type: string
  output_index:
    description: The index of the output item that is being processed.
    type: integer
  sequence_number:
    description: The sequence number of this event.
    type: integer
  type:
    description: The type of the event. Always 'response.mcp_list_tools.in_progress'.
    enum:
    - response.mcp_list_tools.in_progress
    type: string
required:
- type
- item_id
- output_index
- sequence_number
