$schema: http://json-schema.org/draft-07/schema#
title: MessageContentImageUrlObject
description: References an image URL in the content of a message.
type: object
properties:
  image_url:
    properties:
      detail:
        default: auto
        description: Specifies the detail level of the image. `low` uses fewer tokens,
          you can opt in to high resolution using `high`. Default value is `auto`
        enum:
        - auto
        - low
        - high
        type: string
      url:
        description: 'The external URL of the image, must be a supported image types:
          jpeg, jpg, png, gif, webp.'
        format: uri
        type: string
    required:
    - url
    type: object
  type:
    description: The type of the content part.
    enum:
    - image_url
    type: string
required:
- type
- image_url
