$schema: http://json-schema.org/draft-07/schema#
title: ResponseProperties
type: object
properties:
  background:
    anyOf:
    - default: false
      description: 'Whether to run the model response in the background.

        [Learn more](https://platform.openai.com/docs/guides/background).

        '
      type: boolean
    - type: 'null'
  max_output_tokens:
    anyOf:
    - description: 'An upper bound for the number of tokens that can be generated
        for a response, including visible output tokens and [reasoning tokens](https://platform.openai.com/docs/guides/reasoning).

        '
      type: integer
    - type: 'null'
  max_tool_calls:
    anyOf:
    - description: 'The maximum number of total calls to built-in tools that can be
        processed in a response. This maximum number applies across all built-in tool
        calls, not per individual tool. Any further attempts to call a tool by the
        model will be ignored.

        '
      type: integer
    - type: 'null'
  model:
    $ref: model_ids_responses.yaml
    description: 'Model ID used to generate the response, like `gpt-4o` or `o3`. OpenAI

      offers a wide range of models with different capabilities, performance

      characteristics, and price points. Refer to the [model guide](https://platform.openai.com/docs/models)

      to browse and compare available models.

      '
  previous_response_id:
    anyOf:
    - description: 'The unique ID of the previous response to the model. Use this
        to

        create multi-turn conversations. Learn more about

        [conversation state](https://platform.openai.com/docs/guides/conversation-state).
        Cannot be used in conjunction with `conversation`.

        '
      type: string
    - type: 'null'
  prompt:
    $ref: prompt.yaml
  reasoning:
    anyOf:
    - $ref: reasoning.yaml
    - type: 'null'
  text:
    $ref: response_text_param.yaml
  tool_choice:
    $ref: tool_choice_param.yaml
  tools:
    $ref: tools_array.yaml
  truncation:
    anyOf:
    - default: disabled
      description: "The truncation strategy to use for the model response.\n- `auto`:\
        \ If the input to this Response exceeds\n  the model's context window size,\
        \ the model will truncate the\n  response to fit the context window by dropping\
        \ items from the beginning of the conversation.\n- `disabled` (default): If\
        \ the input size will exceed the context window\n  size for a model, the request\
        \ will fail with a 400 error.\n"
      enum:
      - auto
      - disabled
      type: string
    - type: 'null'
