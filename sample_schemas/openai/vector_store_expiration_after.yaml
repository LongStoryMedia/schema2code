$schema: http://json-schema.org/draft-07/schema#
title: VectorStoreExpirationAfter
description: The expiration policy for a vector store.
type: object
properties:
  anchor:
    description: 'Anchor timestamp after which the expiration policy applies. Supported
      anchors: `last_active_at`.'
    enum:
    - last_active_at
    type: string
  days:
    description: The number of days after the anchor time that the vector store will
      expire.
    maximum: 365
    minimum: 1
    type: integer
required:
- anchor
- days
