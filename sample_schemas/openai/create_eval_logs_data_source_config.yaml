$schema: http://json-schema.org/draft-07/schema#
title: CreateEvalLogsDataSourceConfig
description: 'A data source config which specifies the metadata property of your logs
  query.

  This is usually metadata like `usecase=chatbot` or `prompt-version=v2`, etc.

  '
type: object
properties:
  metadata:
    additionalProperties: true
    description: Metadata filters for the logs data source.
    type: object
  type:
    default: logs
    description: The type of data source. Always `logs`.
    enum:
    - logs
    type: string
required:
- type
