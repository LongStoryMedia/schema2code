$schema: http://json-schema.org/draft-07/schema#
title: CreateModerationRequest
type: object
properties:
  input:
    anyOf:
    - default: ''
      description: A string of text to classify for moderation.
      example: I want to kill them.
      type: string
    - description: An array of strings to classify for moderation.
      items:
        default: ''
        example: I want to kill them.
        type: string
      type: array
    - description: An array of multi-modal inputs to the moderation model.
      items:
        anyOf:
        - $ref: moderation_image_url_input.yaml
        - $ref: moderation_text_input.yaml
        discriminator:
          propertyName: type
      title: Moderation Multi Modal Array
      type: array
    description: 'Input (or inputs) to classify. Can be a single string, an array
      of strings, or

      an array of multi-modal input objects similar to other models.

      '
  model:
    anyOf:
    - type: string
    - enum:
      - omni-moderation-latest
      - omni-moderation-2024-09-26
      - text-moderation-latest
      - text-moderation-stable
      type: string
    description: 'The content moderation model you would like to use. Learn more in

      [the moderation guide](https://platform.openai.com/docs/guides/moderation),
      and learn about

      available models [here](https://platform.openai.com/docs/models#moderation).

      '
    nullable: false
required:
- input
