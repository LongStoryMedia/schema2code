$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionMessageList
description: 'An object representing a list of chat completion messages.

  '
type: object
properties:
  data:
    description: 'An array of chat completion message objects.

      '
    items:
      allOf:
      - $ref: chat_completion_response_message.yaml
      - properties:
          content_parts:
            anyOf:
            - description: 'If a content parts array was provided, this is an array
                of `text` and `image_url` parts.

                Otherwise, null.

                '
              items:
                anyOf:
                - $ref: chat_completion_request_message_content_part_text.yaml
                - $ref: chat_completion_request_message_content_part_image.yaml
              type: array
            - type: 'null'
          id:
            description: The identifier of the chat message.
            type: string
        required:
        - id
        type: object
    type: array
  first_id:
    description: The identifier of the first chat message in the data array.
    type: string
  has_more:
    description: Indicates whether there are more chat messages available.
    type: boolean
  last_id:
    description: The identifier of the last chat message in the data array.
    type: string
  object:
    default: list
    description: 'The type of this object. It is always set to "list".

      '
    enum:
    - list
    type: string
required:
- object
- data
- first_id
- last_id
- has_more
