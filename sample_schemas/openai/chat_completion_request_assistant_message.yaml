$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionRequestAssistantMessage
description: 'Messages sent by the model in response to user messages.

  '
type: object
properties:
  audio:
    anyOf:
    - description: 'Data about a previous audio response from the model.

        [Learn more](https://platform.openai.com/docs/guides/audio).

        '
      properties:
        id:
          description: 'Unique identifier for a previous audio response from the model.

            '
          type: string
      required:
      - id
      type: object
    - type: 'null'
  content:
    anyOf:
    - anyOf:
      - description: The contents of the assistant message.
        title: Text content
        type: string
      - description: An array of content parts with a defined type. Can be one or
          more of type `text`, or exactly one of type `refusal`.
        items:
          $ref: chat_completion_request_assistant_message_content_part.yaml
        minItems: 1
        title: Array of content parts
        type: array
      description: 'The contents of the assistant message. Required unless `tool_calls`
        or `function_call` is specified.

        '
    - type: 'null'
  function_call:
    anyOf:
    - deprecated: true
      description: Deprecated and replaced by `tool_calls`. The name and arguments
        of a function that should be called, as generated by the model.
      properties:
        arguments:
          description: The arguments to call the function with, as generated by the
            model in JSON format. Note that the model does not always generate valid
            JSON, and may hallucinate parameters not defined by your function schema.
            Validate the arguments in your code before calling your function.
          type: string
        name:
          description: The name of the function to call.
          type: string
      required:
      - arguments
      - name
      type: object
    - type: 'null'
  name:
    description: An optional name for the participant. Provides the model information
      to differentiate between participants of the same role.
    type: string
  refusal:
    anyOf:
    - description: The refusal message by the assistant.
      type: string
    - type: 'null'
  role:
    description: The role of the messages author, in this case `assistant`.
    enum:
    - assistant
    type: string
  tool_calls:
    $ref: chat_completion_message_tool_calls.yaml
required:
- role
