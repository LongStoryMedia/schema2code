$schema: http://json-schema.org/draft-07/schema#
title: RealtimeCreateClientSecretRequest
description: 'Create a session and client secret for the Realtime API. The request
  can specify

  either a realtime or a transcription session configuration.

  [Learn more about the Realtime API](https://platform.openai.com/docs/guides/realtime).

  '
type: object
properties:
  expires_after:
    description: 'Configuration for the client secret expiration. Expiration refers
      to the time after which

      a client secret will no longer be valid for creating sessions. The session itself
      may

      continue after that time once started. A secret can be used to create multiple
      sessions

      until it expires.

      '
    properties:
      anchor:
        default: created_at
        description: 'The anchor point for the client secret expiration, meaning that
          `seconds` will be added to the `created_at` time of the client secret to
          produce an expiration timestamp. Only `created_at` is currently supported.

          '
        enum:
        - created_at
        type: string
      seconds:
        default: 600
        description: 'The number of seconds from the anchor point to the expiration.
          Select a value between `10` and `7200` (2 hours). This default to 600 seconds
          (10 minutes) if not specified.

          '
        maximum: 7200
        minimum: 10
        type: integer
    title: Client secret expiration
    type: object
  session:
    anyOf:
    - $ref: realtime_session_create_request_ga.yaml
    - $ref: realtime_transcription_session_create_request_ga.yaml
    description: 'Session configuration to use for the client secret. Choose either
      a realtime

      session or a transcription session.

      '
    discriminator:
      propertyName: type
    title: Session configuration
