$schema: http://json-schema.org/draft-07/schema#
title: RoleListResource
description: Paginated list of roles assigned to a principal.
type: object
properties:
  data:
    description: Role assignments returned in the current page.
    items:
      $ref: assigned_role_details.yaml
    type: array
  has_more:
    description: Whether additional assignments are available when paginating.
    type: boolean
  next:
    anyOf:
    - type: string
    - type: 'null'
    description: Cursor to fetch the next page of results, or `null` when there are
      no more assignments.
  object:
    description: Always `list`.
    enum:
    - list
    type: string
required:
- object
- data
- has_more
- next
