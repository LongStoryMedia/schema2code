$schema: http://json-schema.org/draft-07/schema#
title: RealtimeBetaResponseCreateParams
description: Create a new Realtime response with these parameters
type: object
properties:
  conversation:
    anyOf:
    - type: string
    - default: auto
      enum:
      - auto
      - none
      type: string
    description: "Controls which conversation the response is added to. Currently\
      \ supports\n`auto` and `none`, with `auto` as the default value. The `auto`\
      \ value\nmeans that the contents of the response will be added to the default\n\
      conversation. Set this to `none` to create an out-of-band response which \n\
      will not add items to default conversation.\n"
  input:
    description: 'Input items to include in the prompt for the model. Using this field

      creates a new context for this Response instead of using the default

      conversation. An empty array `[]` will clear the context for this Response.

      Note that this can include references to items from the default conversation.

      '
    items:
      $ref: realtime_conversation_item.yaml
    type: array
  instructions:
    description: "The default system instructions (i.e. system message) prepended\
      \ to model \ncalls. This field allows the client to guide the model on desired\
      \ \nresponses. The model can be instructed on response content and format, \n\
      (e.g. \"be extremely succinct\", \"act friendly\", \"here are examples of good\
      \ \nresponses\") and on audio behavior (e.g. \"talk quickly\", \"inject emotion\
      \ \ninto your voice\", \"laugh frequently\"). The instructions are not guaranteed\
      \ \nto be followed by the model, but they provide guidance to the model on the\
      \ \ndesired behavior.\n\nNote that the server sets default instructions which\
      \ will be used if this \nfield is not set and are visible in the `session.created`\
      \ event at the \nstart of the session.\n"
    type: string
  max_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  metadata:
    $ref: metadata.yaml
  modalities:
    description: 'The set of modalities the model can respond with. To disable audio,

      set this to ["text"].

      '
    items:
      enum:
      - text
      - audio
      type: string
    type: array
  output_audio_format:
    description: 'The format of output audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      '
    enum:
    - pcm16
    - g711_ulaw
    - g711_alaw
    type: string
  prompt:
    $ref: prompt.yaml
  temperature:
    description: 'Sampling temperature for the model, limited to [0.6, 1.2]. Defaults
      to 0.8.

      '
    type: number
  tool_choice:
    anyOf:
    - $ref: tool_choice_options.yaml
    - $ref: tool_choice_function.yaml
    - $ref: tool_choice_mcp.yaml
    default: auto
    description: 'How the model chooses tools. Provide one of the string modes or
      force a specific

      function/MCP tool.

      '
  tools:
    description: Tools (functions) available to the model.
    items:
      properties:
        description:
          description: "The description of the function, including guidance on when\
            \ and how \nto call it, and guidance about what to tell the user when\
            \ calling \n(if anything).\n"
          type: string
        name:
          description: The name of the function.
          type: string
        parameters:
          description: Parameters of the function in JSON Schema.
          type: object
        type:
          description: The type of the tool, i.e. `function`.
          enum:
          - function
          type: string
      type: object
    type: array
  voice:
    $ref: voice_ids_shared.yaml
    description: The voice the model uses to respond. Supported built-in voices are
      `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`, `shimmer`, `verse`, `marin`,
      and `cedar`. Voice cannot be changed during the session once the model has responded
      with audio at least once.
