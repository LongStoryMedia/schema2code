$schema: http://json-schema.org/draft-07/schema#
title: ConversationResource
type: object
properties:
  created_at:
    description: The time at which the conversation was created, measured in seconds
      since the Unix epoch.
    type: integer
  id:
    description: The unique ID of the conversation.
    type: string
  metadata:
    description: "Set of 16 key-value pairs that can be attached to an object. This\
      \ can be         useful for storing additional information about the object\
      \ in a structured         format, and querying for objects via API or the dashboard.\n\
      \        Keys are strings with a maximum length of 64 characters. Values are\
      \ strings         with a maximum length of 512 characters."
  object:
    default: conversation
    description: The object type, which is always `conversation`.
    enum:
    - conversation
    type: string
required:
- id
- object
- metadata
- created_at
