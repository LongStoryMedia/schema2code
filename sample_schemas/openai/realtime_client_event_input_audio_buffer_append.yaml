$schema: http://json-schema.org/draft-07/schema#
title: RealtimeClientEventInputAudioBufferAppend
description: "Send this event to append audio bytes to the input audio buffer. The\
  \ audio \nbuffer is temporary storage you can write to and later commit. A \"commit\"\
  \ will create a new\nuser message item in the conversation history from the buffer\
  \ content and clear the buffer.\nInput audio transcription (if enabled) will be\
  \ generated when the buffer is committed.\n\nIf VAD is enabled the audio buffer\
  \ is used to detect speech and the server will decide \nwhen to commit. When Server\
  \ VAD is disabled, you must commit the audio buffer\nmanually. Input audio noise\
  \ reduction operates on writes to the audio buffer.\n\nThe client may choose how\
  \ much audio to place in each event up to a maximum \nof 15 MiB, for example streaming\
  \ smaller chunks from the client may allow the \nVAD to be more responsive. Unlike\
  \ most other client events, the server will \nnot send a confirmation response to\
  \ this event.\n"
type: object
properties:
  audio:
    description: "Base64-encoded audio bytes. This must be in the format specified\
      \ by the \n`input_audio_format` field in the session configuration.\n"
    type: string
  event_id:
    description: Optional client-generated ID used to identify this event.
    maxLength: 512
    type: string
  type:
    const: input_audio_buffer.append
    description: The event type, must be `input_audio_buffer.append`.
required:
- type
- audio
