$schema: http://json-schema.org/draft-07/schema#
title: ComputerScreenshotContent
description: A screenshot of a computer.
type: object
properties:
  file_id:
    anyOf:
    - description: The identifier of an uploaded file that contains the screenshot.
      type: string
    - type: 'null'
  image_url:
    anyOf:
    - description: The URL of the screenshot image.
      type: string
    - type: 'null'
  type:
    default: computer_screenshot
    description: Specifies the event type. For a computer screenshot, this property
      is always set to `computer_screenshot`.
    enum:
    - computer_screenshot
    type: string
required:
- type
- image_url
- file_id
