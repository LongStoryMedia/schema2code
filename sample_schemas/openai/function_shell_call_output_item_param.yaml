$schema: http://json-schema.org/draft-07/schema#
title: FunctionShellCallOutputItemParam
description: The streamed output items emitted by a shell tool call.
type: object
properties:
  call_id:
    description: The unique ID of the shell tool call generated by the model.
    maxLength: 64
    minLength: 1
    type: string
  id:
    anyOf:
    - description: The unique ID of the shell tool call output. Populated when this
        item is returned via API.
      example: sho_123
      type: string
    - type: 'null'
  max_output_length:
    anyOf:
    - description: The maximum number of UTF-8 characters captured for this shell
        call's combined output.
      type: integer
    - type: 'null'
  output:
    description: Captured chunks of stdout and stderr output, along with their associated
      outcomes.
    items:
      $ref: function_shell_call_output_content_param.yaml
    type: array
  type:
    default: shell_call_output
    description: The type of the item. Always `shell_call_output`.
    enum:
    - shell_call_output
    type: string
required:
- call_id
- type
- output
