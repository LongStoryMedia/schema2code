$schema: http://json-schema.org/draft-07/schema#
title: FunctionShellCallItemParam
description: A tool representing a request to execute one or more shell commands.
type: object
properties:
  action:
    $ref: function_shell_action_param.yaml
    description: The shell commands and limits that describe how to run the tool call.
  call_id:
    description: The unique ID of the shell tool call generated by the model.
    maxLength: 64
    minLength: 1
    type: string
  id:
    anyOf:
    - description: The unique ID of the shell tool call. Populated when this item
        is returned via API.
      example: sh_123
      type: string
    - type: 'null'
  status:
    anyOf:
    - $ref: function_shell_call_item_status.yaml
      description: The status of the shell call. One of `in_progress`, `completed`,
        or `incomplete`.
    - type: 'null'
  type:
    default: shell_call
    description: The type of the item. Always `shell_call`.
    enum:
    - shell_call
    type: string
required:
- call_id
- type
- action
