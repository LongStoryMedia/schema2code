$schema: http://json-schema.org/draft-07/schema#
title: StaticChunkingStrategy
type: object
properties:
  chunk_overlap_tokens:
    description: 'The number of tokens that overlap between chunks. The default value
      is `400`.


      Note that the overlap must not exceed half of `max_chunk_size_tokens`.

      '
    type: integer
  max_chunk_size_tokens:
    description: The maximum number of tokens in each chunk. The default value is
      `800`. The minimum value is `100` and the maximum value is `4096`.
    maximum: 4096
    minimum: 100
    type: integer
required:
- max_chunk_size_tokens
- chunk_overlap_tokens
additionalProperties: false
