$schema: http://json-schema.org/draft-07/schema#
title: GraderMulti
description: A MultiGrader object combines the output of multiple graders to produce
  a single score.
type: object
properties:
  calculate_output:
    description: A formula to calculate the output based on grader results.
    type: string
  graders:
    anyOf:
    - $ref: grader_string_check.yaml
    - $ref: grader_text_similarity.yaml
    - $ref: grader_python.yaml
    - $ref: grader_score_model.yaml
    - $ref: grader_label_model.yaml
  name:
    description: The name of the grader.
    type: string
  type:
    default: multi
    description: The object type, which is always `multi`.
    enum:
    - multi
    type: string
required:
- name
- type
- graders
- calculate_output
