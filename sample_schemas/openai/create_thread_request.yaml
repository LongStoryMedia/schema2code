$schema: http://json-schema.org/draft-07/schema#
title: CreateThreadRequest
description: 'Options to create a new thread. If no thread is provided when running
  a

  request, an empty thread will be created.

  '
type: object
properties:
  messages:
    description: A list of [messages](https://platform.openai.com/docs/api-reference/messages)
      to start the thread with.
    items:
      $ref: create_message_request.yaml
    type: array
  metadata:
    $ref: metadata.yaml
  tool_resources:
    anyOf:
    - description: 'A set of resources that are made available to the assistant''s
        tools in this thread. The resources are specific to the type of tool. For
        example, the `code_interpreter` tool requires a list of file IDs, while the
        `file_search` tool requires a list of vector store IDs.

        '
      properties:
        code_interpreter:
          properties:
            file_ids:
              default: []
              description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
                IDs made available to the `code_interpreter` tool. There can be a
                maximum of 20 files associated with the tool.

                '
              items:
                type: string
              maxItems: 20
              type: array
          type: object
        file_search:
          anyOf:
          - required:
            - vector_store_ids
          - required:
            - vector_stores
          properties:
            vector_store_ids:
              description: 'The [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                attached to this thread. There can be a maximum of 1 vector store
                attached to the thread.

                '
              items:
                type: string
              maxItems: 1
              type: array
            vector_stores:
              description: 'A helper to create a [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
                with file_ids and attach it to this thread. There can be a maximum
                of 1 vector store attached to the thread.

                '
              items:
                properties:
                  chunking_strategy:
                    anyOf:
                    - additionalProperties: false
                      description: The default strategy. This strategy currently uses
                        a `max_chunk_size_tokens` of `800` and `chunk_overlap_tokens`
                        of `400`.
                      properties:
                        type:
                          description: Always `auto`.
                          enum:
                          - auto
                          type: string
                      required:
                      - type
                      title: Auto Chunking Strategy
                      type: object
                    - additionalProperties: false
                      properties:
                        static:
                          additionalProperties: false
                          properties:
                            chunk_overlap_tokens:
                              description: 'The number of tokens that overlap between
                                chunks. The default value is `400`.


                                Note that the overlap must not exceed half of `max_chunk_size_tokens`.

                                '
                              type: integer
                            max_chunk_size_tokens:
                              description: The maximum number of tokens in each chunk.
                                The default value is `800`. The minimum value is `100`
                                and the maximum value is `4096`.
                              maximum: 4096
                              minimum: 100
                              type: integer
                          required:
                          - max_chunk_size_tokens
                          - chunk_overlap_tokens
                          type: object
                        type:
                          description: Always `static`.
                          enum:
                          - static
                          type: string
                      required:
                      - type
                      - static
                      title: Static Chunking Strategy
                      type: object
                    description: The chunking strategy used to chunk the file(s).
                      If not set, will use the `auto` strategy.
                    discriminator:
                      propertyName: type
                    type: object
                  file_ids:
                    description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
                      IDs to add to the vector store. There can be a maximum of 10000
                      files in a vector store.

                      '
                    items:
                      type: string
                    maxItems: 10000
                    type: array
                  metadata:
                    $ref: metadata.yaml
                type: object
              maxItems: 1
              type: array
          type: object
      type: object
    - type: 'null'
additionalProperties: false
