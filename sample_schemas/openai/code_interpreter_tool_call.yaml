$schema: http://json-schema.org/draft-07/schema#
title: CodeInterpreterToolCall
description: 'A tool call to run code.

  '
type: object
properties:
  code:
    anyOf:
    - description: 'The code to run, or null if not available.

        '
      type: string
    - type: 'null'
  container_id:
    description: 'The ID of the container used to run the code.

      '
    type: string
  id:
    description: 'The unique ID of the code interpreter tool call.

      '
    type: string
  outputs:
    anyOf:
    - description: 'The outputs generated by the code interpreter, such as logs or
        images.

        Can be null if no outputs are available.

        '
      discriminator:
        propertyName: type
      items:
        anyOf:
        - $ref: code_interpreter_output_logs.yaml
        - $ref: code_interpreter_output_image.yaml
        discriminator:
          propertyName: type
      type: array
    - type: 'null'
  status:
    description: 'The status of the code interpreter tool call. Valid values are `in_progress`,
      `completed`, `incomplete`, `interpreting`, and `failed`.

      '
    enum:
    - in_progress
    - completed
    - incomplete
    - interpreting
    - failed
    type: string
  type:
    default: code_interpreter_call
    description: 'The type of the code interpreter tool call. Always `code_interpreter_call`.

      '
    enum:
    - code_interpreter_call
    type: string
required:
- type
- id
- status
- container_id
- code
- outputs
