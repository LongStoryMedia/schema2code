$schema: http://json-schema.org/draft-07/schema#
title: CustomToolCallOutput
description: 'The output of a custom tool call from your code, being sent back to
  the model.

  '
type: object
properties:
  call_id:
    description: 'The call ID, used to map this custom tool call output to a custom
      tool call.

      '
    type: string
  id:
    description: 'The unique ID of the custom tool call output in the OpenAI platform.

      '
    type: string
  output:
    anyOf:
    - description: 'A string of the output of the custom tool call.

        '
      title: string output
      type: string
    - description: 'Text, image, or file output of the custom tool call.

        '
      items:
        $ref: function_and_custom_tool_call_output.yaml
      title: output content list
      type: array
    description: 'The output from the custom tool call generated by your code.

      Can be a string or an list of output content.

      '
  type:
    description: 'The type of the custom tool call output. Always `custom_tool_call_output`.

      '
    enum:
    - custom_tool_call_output
    type: string
required:
- type
- call_id
- output
