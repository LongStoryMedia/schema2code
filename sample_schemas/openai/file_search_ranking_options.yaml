$schema: http://json-schema.org/draft-07/schema#
title: FileSearchRankingOptions
description: 'The ranking options for the file search. If not specified, the file
  search tool will use the `auto` ranker and a score_threshold of 0.


  See the [file search tool documentation](https://platform.openai.com/docs/assistants/tools/file-search#customizing-file-search-settings)
  for more information.

  '
type: object
properties:
  ranker:
    $ref: file_search_ranker.yaml
  score_threshold:
    description: The score threshold for the file search. All values must be a floating
      point number between 0 and 1.
    maximum: 1
    minimum: 0
    type: number
required:
- score_threshold
