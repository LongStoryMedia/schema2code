$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionAllowedTools
description: 'Constrains the tools available to the model to a pre-defined set.

  '
type: object
properties:
  mode:
    description: 'Constrains the tools available to the model to a pre-defined set.


      `auto` allows the model to pick from among the allowed tools and generate a

      message.


      `required` requires the model to call one or more of the allowed tools.

      '
    enum:
    - auto
    - required
    type: string
  tools:
    description: "A list of tool definitions that the model should be allowed to call.\n\
      \nFor the Chat Completions API, the list of tool definitions might look like:\n\
      ```json\n[\n  { \"type\": \"function\", \"function\": { \"name\": \"get_weather\"\
      \ } },\n  { \"type\": \"function\", \"function\": { \"name\": \"get_time\" }\
      \ }\n]\n```\n"
    items:
      additionalProperties: true
      description: 'A tool definition that the model should be allowed to call.

        '
      type: object
    type: array
required:
- mode
- tools
