$schema: http://json-schema.org/draft-07/schema#
title: PredictionContent
description: 'Static predicted output content, such as the content of a text file
  that is

  being regenerated.

  '
type: object
properties:
  content:
    anyOf:
    - description: 'The content used for a Predicted Output. This is often the

        text of a file you are regenerating with minor changes.

        '
      title: Text content
      type: string
    - description: An array of content parts with a defined type. Supported options
        differ based on the [model](https://platform.openai.com/docs/models) being
        used to generate the response. Can contain text inputs.
      items:
        $ref: chat_completion_request_message_content_part_text.yaml
      minItems: 1
      title: Array of content parts
      type: array
    description: 'The content that should be matched when generating a model response.

      If generated tokens would match this content, the entire model response

      can be returned much more quickly.

      '
  type:
    description: 'The type of the predicted content you want to provide. This type
      is

      currently always `content`.

      '
    enum:
    - content
    type: string
required:
- type
- content
