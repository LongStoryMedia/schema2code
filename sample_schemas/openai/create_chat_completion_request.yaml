$schema: http://json-schema.org/draft-07/schema#
title: CreateChatCompletionRequest
allOf:
- $ref: create_model_response_properties.yaml
- properties:
    audio:
      description: 'Parameters for audio output. Required when audio output is requested
        with

        `modalities: ["audio"]`. [Learn more](https://platform.openai.com/docs/guides/audio).

        '
      nullable: true
      properties:
        format:
          description: 'Specifies the output audio format. Must be one of `wav`, `mp3`,
            `flac`,

            `opus`, or `pcm16`.

            '
          enum:
          - wav
          - aac
          - mp3
          - flac
          - opus
          - pcm16
          type: string
        voice:
          $ref: voice_ids_shared.yaml
          description: The voice the model uses to respond. Supported built-in voices
            are `alloy`, `ash`, `ballad`, `coral`, `echo`, `fable`, `nova`, `onyx`,
            `sage`, `shimmer`, `marin`, and `cedar`.
      required:
      - voice
      - format
      type: object
    frequency_penalty:
      default: 0
      description: 'Number between -2.0 and 2.0. Positive values penalize new tokens
        based on

        their existing frequency in the text so far, decreasing the model''s

        likelihood to repeat the same line verbatim.

        '
      maximum: 2
      minimum: -2
      nullable: true
      type: number
    function_call:
      anyOf:
      - description: '`none` means the model will not call a function and instead
          generates a message. `auto` means the model can pick between generating
          a message or calling a function.

          '
        enum:
        - none
        - auto
        title: function call mode
        type: string
      - $ref: chat_completion_function_call_option.yaml
      deprecated: true
      description: 'Deprecated in favor of `tool_choice`.


        Controls which (if any) function is called by the model.


        `none` means the model will not call a function and instead generates a

        message.


        `auto` means the model can pick between generating a message or calling a

        function.


        Specifying a particular function via `{"name": "my_function"}` forces the

        model to call that function.


        `none` is the default when no functions are present. `auto` is the default

        if functions are present.

        '
    functions:
      deprecated: true
      description: 'Deprecated in favor of `tools`.


        A list of functions the model may generate JSON inputs for.

        '
      items:
        $ref: chat_completion_functions.yaml
      maxItems: 128
      minItems: 1
      type: array
    logit_bias:
      additionalProperties:
        type: integer
      default: null
      description: 'Modify the likelihood of specified tokens appearing in the completion.


        Accepts a JSON object that maps tokens (specified by their token ID in the

        tokenizer) to an associated bias value from -100 to 100. Mathematically,

        the bias is added to the logits generated by the model prior to sampling.

        The exact effect will vary per model, but values between -1 and 1 should

        decrease or increase likelihood of selection; values like -100 or 100

        should result in a ban or exclusive selection of the relevant token.

        '
      nullable: true
      type: object
    logprobs:
      default: false
      description: 'Whether to return log probabilities of the output tokens or not.
        If true,

        returns the log probabilities of each output token returned in the

        `content` of `message`.

        '
      nullable: true
      type: boolean
    max_completion_tokens:
      description: 'An upper bound for the number of tokens that can be generated
        for a completion, including visible output tokens and [reasoning tokens](https://platform.openai.com/docs/guides/reasoning).

        '
      nullable: true
      type: integer
    max_tokens:
      deprecated: true
      description: 'The maximum number of [tokens](/tokenizer) that can be generated
        in the

        chat completion. This value can be used to control

        [costs](https://openai.com/api/pricing/) for text generated via API.


        This value is now deprecated in favor of `max_completion_tokens`, and is

        not compatible with [o-series models](https://platform.openai.com/docs/guides/reasoning).

        '
      nullable: true
      type: integer
    messages:
      description: 'A list of messages comprising the conversation so far. Depending
        on the

        [model](https://platform.openai.com/docs/models) you use, different message
        types (modalities) are

        supported, like [text](https://platform.openai.com/docs/guides/text-generation),

        [images](https://platform.openai.com/docs/guides/vision), and [audio](https://platform.openai.com/docs/guides/audio).

        '
      items:
        $ref: chat_completion_request_message.yaml
      minItems: 1
      type: array
    modalities:
      $ref: response_modalities.yaml
    model:
      $ref: model_ids_shared.yaml
      description: 'Model ID used to generate the response, like `gpt-4o` or `o3`.
        OpenAI

        offers a wide range of models with different capabilities, performance

        characteristics, and price points. Refer to the [model guide](https://platform.openai.com/docs/models)

        to browse and compare available models.

        '
    n:
      default: 1
      description: How many chat completion choices to generate for each input message.
        Note that you will be charged based on the number of generated tokens across
        all of the choices. Keep `n` as `1` to minimize costs.
      example: 1
      maximum: 128
      minimum: 1
      nullable: true
      type: integer
    parallel_tool_calls:
      $ref: parallel_tool_calls.yaml
    prediction:
      anyOf:
      - $ref: prediction_content.yaml
      description: 'Configuration for a [Predicted Output](https://platform.openai.com/docs/guides/predicted-outputs),

        which can greatly improve response times when large parts of the model

        response are known ahead of time. This is most common when you are

        regenerating a file with only minor changes to most of the content.

        '
      discriminator:
        propertyName: type
      nullable: true
    presence_penalty:
      default: 0
      description: 'Number between -2.0 and 2.0. Positive values penalize new tokens
        based on

        whether they appear in the text so far, increasing the model''s likelihood

        to talk about new topics.

        '
      maximum: 2
      minimum: -2
      nullable: true
      type: number
    reasoning_effort:
      $ref: reasoning_effort.yaml
    response_format:
      anyOf:
      - $ref: response_format_text.yaml
      - $ref: response_format_json_schema.yaml
      - $ref: response_format_json_object.yaml
      description: 'An object specifying the format that the model must output.


        Setting to `{ "type": "json_schema", "json_schema": {...} }` enables

        Structured Outputs which ensures the model will match your supplied JSON

        schema. Learn more in the [Structured Outputs

        guide](https://platform.openai.com/docs/guides/structured-outputs).


        Setting to `{ "type": "json_object" }` enables the older JSON mode, which

        ensures the message the model generates is valid JSON. Using `json_schema`

        is preferred for models that support it.

        '
      discriminator:
        propertyName: type
    seed:
      deprecated: true
      description: 'This feature is in Beta.

        If specified, our system will make a best effort to sample deterministically,
        such that repeated requests with the same `seed` and parameters should return
        the same result.

        Determinism is not guaranteed, and you should refer to the `system_fingerprint`
        response parameter to monitor changes in the backend.

        '
      maximum: 9223372036854776000
      minimum: -9223372036854776000
      nullable: true
      type: integer
    stop:
      $ref: stop_configuration.yaml
    store:
      default: false
      description: 'Whether or not to store the output of this chat completion request
        for

        use in our [model distillation](https://platform.openai.com/docs/guides/distillation)
        or

        [evals](https://platform.openai.com/docs/guides/evals) products.


        Supports text and image inputs. Note: image inputs over 8MB will be dropped.

        '
      nullable: true
      type: boolean
    stream:
      default: false
      description: 'If set to true, the model response data will be streamed to the
        client

        as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).

        See the [Streaming section below](https://platform.openai.com/docs/api-reference/chat/streaming)

        for more information, along with the [streaming responses](https://platform.openai.com/docs/guides/streaming-responses)

        guide for more information on how to handle the streaming events.

        '
      nullable: true
      type: boolean
    stream_options:
      $ref: chat_completion_stream_options.yaml
    tool_choice:
      $ref: chat_completion_tool_choice_option.yaml
    tools:
      description: 'A list of tools the model may call. You can provide either

        [custom tools](https://platform.openai.com/docs/guides/function-calling#custom-tools)
        or

        [function tools](https://platform.openai.com/docs/guides/function-calling).

        '
      items:
        anyOf:
        - $ref: chat_completion_tool.yaml
        - $ref: custom_tool_chat_completions.yaml
        discriminator:
          propertyName: type
      type: array
    top_logprobs:
      description: 'An integer between 0 and 20 specifying the number of most likely
        tokens to

        return at each token position, each with an associated log probability.

        `logprobs` must be set to `true` if this parameter is used.

        '
      maximum: 20
      minimum: 0
      nullable: true
      type: integer
    verbosity:
      $ref: verbosity.yaml
    web_search_options:
      description: 'This tool searches the web for relevant results to use in a response.

        Learn more about the [web search tool](https://platform.openai.com/docs/guides/tools-web-search?api-mode=chat).

        '
      properties:
        search_context_size:
          $ref: web_search_context_size.yaml
        user_location:
          description: 'Approximate location parameters for the search.

            '
          nullable: true
          properties:
            approximate:
              $ref: web_search_location.yaml
            type:
              description: 'The type of location approximation. Always `approximate`.

                '
              enum:
              - approximate
              type: string
          required:
          - type
          - approximate
          type: object
      title: Web search
      type: object
  required:
  - model
  - messages
  type: object
