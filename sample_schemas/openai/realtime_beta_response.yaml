$schema: http://json-schema.org/draft-07/schema#
title: RealtimeBetaResponse
description: The response resource.
type: object
properties:
  conversation_id:
    description: 'Which conversation the response is added to, determined by the `conversation`

      field in the `response.create` event. If `auto`, the response will be added
      to

      the default conversation and the value of `conversation_id` will be an id like

      `conv_1234`. If `none`, the response will not be added to any conversation and

      the value of `conversation_id` will be `null`. If responses are being triggered

      by server VAD, the response will be added to the default conversation, thus

      the `conversation_id` will be an id like `conv_1234`.

      '
    type: string
  id:
    description: The unique ID of the response.
    type: string
  max_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls, that was used in this response.

      '
  metadata:
    $ref: metadata.yaml
  modalities:
    description: 'The set of modalities the model used to respond. If there are multiple
      modalities,

      the model will pick one, for example if `modalities` is `["text", "audio"]`,
      the model

      could be responding in either text or audio.

      '
    items:
      enum:
      - text
      - audio
      type: string
    type: array
  object:
    const: realtime.response
    description: The object type, must be `realtime.response`.
  output:
    description: The list of output items generated by the response.
    items:
      $ref: realtime_conversation_item.yaml
    type: array
  output_audio_format:
    description: 'The format of output audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      '
    enum:
    - pcm16
    - g711_ulaw
    - g711_alaw
    type: string
  status:
    description: "The final status of the response (`completed`, `cancelled`, `failed`,\
      \ or \n`incomplete`, `in_progress`).\n"
    enum:
    - completed
    - cancelled
    - failed
    - incomplete
    - in_progress
    type: string
  status_details:
    description: Additional details about the status.
    properties:
      error:
        description: "A description of the error that caused the response to fail,\
          \ \npopulated when the `status` is `failed`.\n"
        properties:
          code:
            description: Error code, if any.
            type: string
          type:
            description: The type of error.
            type: string
        type: object
      reason:
        description: "The reason the Response did not complete. For a `cancelled`\
          \ Response, \none of `turn_detected` (the server VAD detected a new start\
          \ of speech) \nor `client_cancelled` (the client sent a cancel event). For\
          \ an \n`incomplete` Response, one of `max_output_tokens` or `content_filter`\
          \ \n(the server-side safety filter activated and cut off the response).\n"
        enum:
        - turn_detected
        - client_cancelled
        - max_output_tokens
        - content_filter
        type: string
      type:
        description: "The type of error that caused the response to fail, corresponding\
          \ \nwith the `status` field (`completed`, `cancelled`, `incomplete`, \n\
          `failed`).\n"
        enum:
        - completed
        - cancelled
        - incomplete
        - failed
        type: string
    type: object
  temperature:
    description: 'Sampling temperature for the model, limited to [0.6, 1.2]. Defaults
      to 0.8.

      '
    type: number
  usage:
    description: "Usage statistics for the Response, this will correspond to billing.\
      \ A \nRealtime API session will maintain a conversation context and append new\
      \ \nItems to the Conversation, thus output from previous turns (text and \n\
      audio tokens) will become the input for later turns.\n"
    properties:
      input_token_details:
        description: Details about the input tokens used in the Response.
        properties:
          audio_tokens:
            description: The number of audio tokens used as input for the Response.
            type: integer
          cached_tokens:
            description: The number of cached tokens used as input for the Response.
            type: integer
          cached_tokens_details:
            description: Details about the cached tokens used as input for the Response.
            properties:
              audio_tokens:
                description: The number of cached audio tokens used as input for the
                  Response.
                type: integer
              image_tokens:
                description: The number of cached image tokens used as input for the
                  Response.
                type: integer
              text_tokens:
                description: The number of cached text tokens used as input for the
                  Response.
                type: integer
            type: object
          image_tokens:
            description: The number of image tokens used as input for the Response.
            type: integer
          text_tokens:
            description: The number of text tokens used as input for the Response.
            type: integer
        type: object
      input_tokens:
        description: "The number of input tokens used in the Response, including text\
          \ and \naudio tokens.\n"
        type: integer
      output_token_details:
        description: Details about the output tokens used in the Response.
        properties:
          audio_tokens:
            description: The number of audio tokens used in the Response.
            type: integer
          text_tokens:
            description: The number of text tokens used in the Response.
            type: integer
        type: object
      output_tokens:
        description: "The number of output tokens sent in the Response, including\
          \ text and \naudio tokens.\n"
        type: integer
      total_tokens:
        description: "The total number of tokens in the Response including input and\
          \ output \ntext and audio tokens.\n"
        type: integer
    type: object
  voice:
    $ref: voice_ids_shared.yaml
    description: 'The voice the model used to respond.

      Current voice options are `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`,

      `shimmer`, and `verse`.

      '
