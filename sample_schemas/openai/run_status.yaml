$schema: http://json-schema.org/draft-07/schema#
title: RunStatus
description: The status of the run, which can be either `queued`, `in_progress`, `requires_action`,
  `cancelling`, `cancelled`, `failed`, `completed`, `incomplete`, or `expired`.
type: string
enum:
- queued
- in_progress
- requires_action
- cancelling
- cancelled
- failed
- completed
- incomplete
- expired
