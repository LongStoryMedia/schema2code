$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionResponseMessage
description: A chat completion message generated by the model.
type: object
properties:
  annotations:
    description: 'Annotations for the message, when applicable, as when using the

      [web search tool](https://platform.openai.com/docs/guides/tools-web-search?api-mode=chat).

      '
    items:
      description: 'A URL citation when using web search.

        '
      properties:
        type:
          description: The type of the URL citation. Always `url_citation`.
          enum:
          - url_citation
          type: string
        url_citation:
          description: A URL citation when using web search.
          properties:
            end_index:
              description: The index of the last character of the URL citation in
                the message.
              type: integer
            start_index:
              description: The index of the first character of the URL citation in
                the message.
              type: integer
            title:
              description: The title of the web resource.
              type: string
            url:
              description: The URL of the web resource.
              type: string
          required:
          - end_index
          - start_index
          - url
          - title
          type: object
      required:
      - type
      - url_citation
      type: object
    type: array
  audio:
    anyOf:
    - description: 'If the audio output modality is requested, this object contains
        data

        about the audio response from the model. [Learn more](https://platform.openai.com/docs/guides/audio).

        '
      properties:
        data:
          description: 'Base64 encoded audio bytes generated by the model, in the
            format

            specified in the request.

            '
          type: string
        expires_at:
          description: 'The Unix timestamp (in seconds) for when this audio response
            will

            no longer be accessible on the server for use in multi-turn

            conversations.

            '
          type: integer
        id:
          description: Unique identifier for this audio response.
          type: string
        transcript:
          description: Transcript of the audio generated by the model.
          type: string
      required:
      - id
      - expires_at
      - data
      - transcript
      type: object
    - type: 'null'
  content:
    anyOf:
    - description: The contents of the message.
      type: string
    - type: 'null'
  function_call:
    deprecated: true
    description: Deprecated and replaced by `tool_calls`. The name and arguments of
      a function that should be called, as generated by the model.
    properties:
      arguments:
        description: The arguments to call the function with, as generated by the
          model in JSON format. Note that the model does not always generate valid
          JSON, and may hallucinate parameters not defined by your function schema.
          Validate the arguments in your code before calling your function.
        type: string
      name:
        description: The name of the function to call.
        type: string
    required:
    - name
    - arguments
    type: object
  refusal:
    anyOf:
    - description: The refusal message generated by the model.
      type: string
    - type: 'null'
  role:
    description: The role of the author of this message.
    enum:
    - assistant
    type: string
  tool_calls:
    $ref: chat_completion_message_tool_calls.yaml
required:
- role
- content
- refusal
