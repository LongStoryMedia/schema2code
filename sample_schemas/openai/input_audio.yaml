$schema: http://json-schema.org/draft-07/schema#
title: InputAudio
description: 'An audio input to the model.

  '
type: object
properties:
  input_audio:
    properties:
      data:
        description: 'Base64-encoded audio data.

          '
        type: string
      format:
        description: 'The format of the audio data. Currently supported formats are
          `mp3` and

          `wav`.

          '
        enum:
        - mp3
        - wav
        type: string
    required:
    - data
    - format
    type: object
  type:
    description: 'The type of the input item. Always `input_audio`.

      '
    enum:
    - input_audio
    type: string
required:
- type
- input_audio
