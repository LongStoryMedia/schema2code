$schema: http://json-schema.org/draft-07/schema#
title: RealtimeSessionCreateRequest
description: 'A new Realtime session configuration, with an ephemeral key. Default
  TTL

  for keys is one minute.

  '
type: object
properties:
  client_secret:
    description: Ephemeral key returned by the API.
    properties:
      expires_at:
        description: 'Timestamp for when the token expires. Currently, all tokens
          expire

          after one minute.

          '
        type: integer
      value:
        description: 'Ephemeral key usable in client environments to authenticate
          connections

          to the Realtime API. Use this in client-side environments rather than

          a standard API token, which should only be used server-side.

          '
        type: string
    required:
    - value
    - expires_at
    type: object
  input_audio_format:
    description: 'The format of input audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      '
    type: string
  input_audio_transcription:
    description: 'Configuration for input audio transcription, defaults to off and
      can be

      set to `null` to turn off once on. Input audio transcription is not native

      to the model, since the model consumes audio directly. Transcription runs

      asynchronously and should be treated as rough guidance

      rather than the representation understood by the model.

      '
    properties:
      model:
        description: 'The model to use for transcription.

          '
        type: string
    type: object
  instructions:
    description: 'The default system instructions (i.e. system message) prepended
      to model calls. This field allows the client to guide the model on desired responses.
      The model can be instructed on response content and format, (e.g. "be extremely
      succinct", "act friendly", "here are examples of good responses") and on audio
      behavior (e.g. "talk quickly", "inject emotion into your voice", "laugh frequently").
      The instructions are not guaranteed to be followed by the model, but they provide
      guidance to the model on the desired behavior.

      Note that the server sets default instructions which will be used if this field
      is not set and are visible in the `session.created` event at the start of the
      session.

      '
    type: string
  max_response_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  modalities:
    description: 'The set of modalities the model can respond with. To disable audio,

      set this to ["text"].

      '
    items:
      enum:
      - text
      - audio
      type: string
  output_audio_format:
    description: 'The format of output audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      '
    type: string
  prompt:
    $ref: prompt.yaml
  speed:
    default: 1
    description: 'The speed of the model''s spoken response. 1.0 is the default speed.
      0.25 is

      the minimum speed. 1.5 is the maximum speed. This value can only be changed

      in between model turns, not while a response is in progress.

      '
    maximum: 1.5
    minimum: 0.25
    type: number
  temperature:
    description: 'Sampling temperature for the model, limited to [0.6, 1.2]. Defaults
      to 0.8.

      '
    type: number
  tool_choice:
    description: 'How the model chooses tools. Options are `auto`, `none`, `required`,
      or

      specify a function.

      '
    type: string
  tools:
    description: Tools (functions) available to the model.
    items:
      properties:
        description:
          description: 'The description of the function, including guidance on when
            and how

            to call it, and guidance about what to tell the user when calling

            (if anything).

            '
          type: string
        name:
          description: The name of the function.
          type: string
        parameters:
          description: Parameters of the function in JSON Schema.
          type: object
        type:
          description: The type of the tool, i.e. `function`.
          enum:
          - function
          type: string
      type: object
    type: array
  tracing:
    anyOf:
    - default: auto
      description: 'Default tracing mode for the session.

        '
      enum:
      - auto
      type: string
    - description: 'Granular configuration for tracing.

        '
      properties:
        group_id:
          description: 'The group id to attach to this trace to enable filtering and

            grouping in the traces dashboard.

            '
          type: string
        metadata:
          description: 'The arbitrary metadata to attach to this trace to enable

            filtering in the traces dashboard.

            '
          type: object
        workflow_name:
          description: 'The name of the workflow to attach to this trace. This is
            used to

            name the trace in the traces dashboard.

            '
          type: string
      title: Tracing Configuration
      type: object
    description: 'Configuration options for tracing. Set to null to disable tracing.
      Once

      tracing is enabled for a session, the configuration cannot be modified.


      `auto` will create a trace for the session with default values for the

      workflow name, group id, and metadata.

      '
    title: Tracing Configuration
  truncation:
    $ref: realtime_truncation.yaml
  turn_detection:
    description: 'Configuration for turn detection. Can be set to `null` to turn off.
      Server

      VAD means that the model will detect the start and end of speech based on

      audio volume and respond at the end of user speech.

      '
    properties:
      prefix_padding_ms:
        description: 'Amount of audio to include before the VAD detected speech (in

          milliseconds). Defaults to 300ms.

          '
        type: integer
      silence_duration_ms:
        description: 'Duration of silence to detect speech stop (in milliseconds).
          Defaults

          to 500ms. With shorter values the model will respond more quickly,

          but may jump in on short pauses from the user.

          '
        type: integer
      threshold:
        description: 'Activation threshold for VAD (0.0 to 1.0), this defaults to
          0.5. A

          higher threshold will require louder audio to activate the model, and

          thus might perform better in noisy environments.

          '
        type: number
      type:
        description: 'Type of turn detection, only `server_vad` is currently supported.

          '
        type: string
    type: object
  voice:
    $ref: voice_ids_shared.yaml
    description: The voice the model uses to respond. Supported built-in voices are
      `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`, `shimmer`, `verse`, `marin`,
      and `cedar`. Voice cannot be changed during the session once the model has responded
      with audio at least once.
required:
- client_secret
