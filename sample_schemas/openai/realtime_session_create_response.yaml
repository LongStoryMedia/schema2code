$schema: http://json-schema.org/draft-07/schema#
title: RealtimeSessionCreateResponse
description: 'A Realtime session configuration object.

  '
type: object
properties:
  audio:
    description: 'Configuration for input and output audio for the session.

      '
    properties:
      input:
        properties:
          format:
            $ref: realtime_audio_formats.yaml
          noise_reduction:
            description: 'Configuration for input audio noise reduction.

              '
            properties:
              type:
                $ref: noise_reduction_type.yaml
            type: object
          transcription:
            $ref: audio_transcription.yaml
            description: 'Configuration for input audio transcription.

              '
          turn_detection:
            description: 'Configuration for turn detection.

              '
            properties:
              prefix_padding_ms:
                type: integer
              silence_duration_ms:
                type: integer
              threshold:
                type: number
              type:
                description: 'Type of turn detection, only `server_vad` is currently
                  supported.

                  '
                type: string
            type: object
        type: object
      output:
        properties:
          format:
            $ref: realtime_audio_formats.yaml
          speed:
            type: number
          voice:
            $ref: voice_ids_shared.yaml
        type: object
    type: object
  expires_at:
    description: Expiration timestamp for the session, in seconds since epoch.
    type: integer
  id:
    description: 'Unique identifier for the session that looks like `sess_1234567890abcdef`.

      '
    type: string
  include:
    description: 'Additional fields to include in server outputs.

      - `item.input_audio_transcription.logprobs`: Include logprobs for input audio
      transcription.

      '
    items:
      enum:
      - item.input_audio_transcription.logprobs
      type: string
    type: array
  instructions:
    description: 'The default system instructions (i.e. system message) prepended
      to model

      calls. This field allows the client to guide the model on desired

      responses. The model can be instructed on response content and format,

      (e.g. "be extremely succinct", "act friendly", "here are examples of good

      responses") and on audio behavior (e.g. "talk quickly", "inject emotion

      into your voice", "laugh frequently"). The instructions are not guaranteed

      to be followed by the model, but they provide guidance to the model on the

      desired behavior.


      Note that the server sets default instructions which will be used if this

      field is not set and are visible in the `session.created` event at the

      start of the session.

      '
    type: string
  max_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  model:
    description: The Realtime model used for this session.
    type: string
  object:
    description: The object type. Always `realtime.session`.
    type: string
  output_modalities:
    description: 'The set of modalities the model can respond with. To disable audio,

      set this to ["text"].

      '
    items:
      enum:
      - text
      - audio
      type: string
  tool_choice:
    description: 'How the model chooses tools. Options are `auto`, `none`, `required`,
      or

      specify a function.

      '
    type: string
  tools:
    description: Tools (functions) available to the model.
    items:
      $ref: realtime_function_tool.yaml
    type: array
  tracing:
    anyOf:
    - default: auto
      description: 'Default tracing mode for the session.

        '
      enum:
      - auto
      type: string
    - description: 'Granular configuration for tracing.

        '
      properties:
        group_id:
          description: 'The group id to attach to this trace to enable filtering and

            grouping in the traces dashboard.

            '
          type: string
        metadata:
          description: 'The arbitrary metadata to attach to this trace to enable

            filtering in the traces dashboard.

            '
          type: object
        workflow_name:
          description: 'The name of the workflow to attach to this trace. This is
            used to

            name the trace in the traces dashboard.

            '
          type: string
      title: Tracing Configuration
      type: object
    description: 'Configuration options for tracing. Set to null to disable tracing.
      Once

      tracing is enabled for a session, the configuration cannot be modified.


      `auto` will create a trace for the session with default values for the

      workflow name, group id, and metadata.

      '
    title: Tracing Configuration
  turn_detection:
    description: 'Configuration for turn detection. Can be set to `null` to turn off.
      Server

      VAD means that the model will detect the start and end of speech based on

      audio volume and respond at the end of user speech.

      '
    properties:
      prefix_padding_ms:
        description: 'Amount of audio to include before the VAD detected speech (in

          milliseconds). Defaults to 300ms.

          '
        type: integer
      silence_duration_ms:
        description: 'Duration of silence to detect speech stop (in milliseconds).
          Defaults

          to 500ms. With shorter values the model will respond more quickly,

          but may jump in on short pauses from the user.

          '
        type: integer
      threshold:
        description: 'Activation threshold for VAD (0.0 to 1.0), this defaults to
          0.5. A

          higher threshold will require louder audio to activate the model, and

          thus might perform better in noisy environments.

          '
        type: number
      type:
        description: 'Type of turn detection, only `server_vad` is currently supported.

          '
        type: string
    type: object
