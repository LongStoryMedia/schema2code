$schema: http://json-schema.org/draft-07/schema#
title: RunStepStreamEvent
anyOf:
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    is created.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.created
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    moves to an `in_progress` state.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.in_progress
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when parts of a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    are being streamed.
  properties:
    data:
      $ref: run_step_delta_object.yaml
    event:
      enum:
      - thread.run.step.delta
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    is completed.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.completed
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    fails.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.failed
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    is cancelled.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.cancelled
      type: string
  required:
  - event
  - data
  type: object
- description: Occurs when a [run step](https://platform.openai.com/docs/api-reference/run-steps/step-object)
    expires.
  properties:
    data:
      $ref: run_step_object.yaml
    event:
      enum:
      - thread.run.step.expired
      type: string
  required:
  - event
  - data
  type: object
discriminator:
  propertyName: event
