$schema: http://json-schema.org/draft-07/schema#
title: ChatkitWorkflow
description: Workflow metadata and state returned for the session.
type: object
properties:
  id:
    description: Identifier of the workflow backing the session.
    type: string
  state_variables:
    anyOf:
    - additionalProperties:
        anyOf:
        - type: string
        - type: integer
        - type: boolean
        - type: number
      description: State variable key-value pairs applied when invoking the workflow.
        Defaults to null when no overrides were provided.
      type: object
    - type: 'null'
  tracing:
    $ref: chatkit_workflow_tracing.yaml
    description: Tracing settings applied to the workflow.
  version:
    anyOf:
    - description: Specific workflow version used for the session. Defaults to null
        when using the latest deployment.
      type: string
    - type: 'null'
required:
- id
- version
- state_variables
- tracing
