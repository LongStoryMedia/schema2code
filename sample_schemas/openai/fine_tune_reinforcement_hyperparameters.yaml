$schema: http://json-schema.org/draft-07/schema#
title: FineTuneReinforcementHyperparameters
description: The hyperparameters used for the reinforcement fine-tuning job.
type: object
properties:
  batch_size:
    anyOf:
    - enum:
      - auto
      type: string
    - maximum: 256
      minimum: 1
      type: integer
    default: auto
    description: 'Number of examples in each batch. A larger batch size means that
      model parameters are updated less frequently, but with lower variance.

      '
  compute_multiplier:
    anyOf:
    - enum:
      - auto
      type: string
    - exclusiveMinimum: true
      maximum: 10
      minimum: 1.0e-05
      type: number
    description: 'Multiplier on amount of compute used for exploring search space
      during training.

      '
  eval_interval:
    anyOf:
    - enum:
      - auto
      type: string
    - minimum: 1
      type: integer
    default: auto
    description: 'The number of training steps between evaluation runs.

      '
  eval_samples:
    anyOf:
    - enum:
      - auto
      type: string
    - minimum: 1
      type: integer
    default: auto
    description: 'Number of evaluation samples to generate per training step.

      '
  learning_rate_multiplier:
    anyOf:
    - enum:
      - auto
      type: string
    - exclusiveMinimum: true
      minimum: 0
      type: number
    description: 'Scaling factor for the learning rate. A smaller learning rate may
      be useful to avoid overfitting.

      '
  n_epochs:
    anyOf:
    - enum:
      - auto
      type: string
    - maximum: 50
      minimum: 1
      type: integer
    default: auto
    description: 'The number of epochs to train the model for. An epoch refers to
      one full cycle through the training dataset.

      '
  reasoning_effort:
    default: default
    description: 'Level of reasoning effort.

      '
    enum:
    - default
    - low
    - medium
    - high
    type: string
