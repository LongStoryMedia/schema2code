$schema: http://json-schema.org/draft-07/schema#
title: CreateVectorStoreFileRequest
type: object
properties:
  attributes:
    $ref: vector_store_file_attributes.yaml
  chunking_strategy:
    $ref: chunking_strategy_request_param.yaml
  file_id:
    description: A [File](https://platform.openai.com/docs/api-reference/files) ID
      that the vector store should use. Useful for tools like `file_search` that can
      access files.
    type: string
required:
- file_id
additionalProperties: false
