$schema: http://json-schema.org/draft-07/schema#
title: RealtimeConversationItemMessageAssistant
description: An assistant message item in a Realtime conversation.
type: object
properties:
  content:
    description: The content of the message.
    items:
      properties:
        audio:
          description: Base64-encoded audio bytes, these will be parsed as the format
            specified in the session output audio type configuration. This defaults
            to PCM 16-bit 24kHz mono if not specified.
          type: string
        text:
          description: The text content.
          type: string
        transcript:
          description: The transcript of the audio content, this will always be present
            if the output type is `audio`.
          type: string
        type:
          description: The content type, `output_text` or `output_audio` depending
            on the session `output_modalities` configuration.
          enum:
          - output_text
          - output_audio
          type: string
      type: object
    type: array
  id:
    description: The unique ID of the item. This may be provided by the client or
      generated by the server.
    type: string
  object:
    description: Identifier for the API object being returned - always `realtime.item`.
      Optional when creating a new item.
    enum:
    - realtime.item
    type: string
  role:
    description: The role of the message sender. Always `assistant`.
    enum:
    - assistant
    type: string
  status:
    description: The status of the item. Has no effect on the conversation.
    enum:
    - completed
    - incomplete
    - in_progress
    type: string
  type:
    description: The type of the item. Always `message`.
    enum:
    - message
    type: string
required:
- type
- role
- content
