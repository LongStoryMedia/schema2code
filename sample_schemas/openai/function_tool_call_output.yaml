$schema: http://json-schema.org/draft-07/schema#
title: FunctionToolCallOutput
description: 'The output of a function tool call.

  '
type: object
properties:
  call_id:
    description: 'The unique ID of the function tool call generated by the model.

      '
    type: string
  id:
    description: 'The unique ID of the function tool call output. Populated when this
      item

      is returned via API.

      '
    type: string
  output:
    anyOf:
    - description: 'A string of the output of the function call.

        '
      title: string output
      type: string
    - description: 'Text, image, or file output of the function call.

        '
      items:
        $ref: function_and_custom_tool_call_output.yaml
      title: output content list
      type: array
    description: 'The output from the function call generated by your code.

      Can be a string or an list of output content.

      '
  status:
    description: 'The status of the item. One of `in_progress`, `completed`, or

      `incomplete`. Populated when items are returned via API.

      '
    enum:
    - in_progress
    - completed
    - incomplete
    type: string
  type:
    description: 'The type of the function tool call output. Always `function_call_output`.

      '
    enum:
    - function_call_output
    type: string
required:
- type
- call_id
- output
