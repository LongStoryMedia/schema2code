$schema: http://json-schema.org/draft-07/schema#
title: GroupListResource
description: Paginated list of organization groups.
type: object
properties:
  data:
    description: Groups returned in the current page.
    items:
      $ref: group_response.yaml
    type: array
  has_more:
    description: Whether additional groups are available when paginating.
    type: boolean
  next:
    anyOf:
    - type: string
    - type: 'null'
    description: Cursor to fetch the next page of results, or `null` if there are
      no more results.
  object:
    description: Always `list`.
    enum:
    - list
    type: string
required:
- object
- data
- has_more
- next
