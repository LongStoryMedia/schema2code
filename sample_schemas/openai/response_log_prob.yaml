$schema: http://json-schema.org/draft-07/schema#
title: ResponseLogProb
description: "A logprob is the logarithmic probability that the model assigns to producing\
  \ \na particular token at a given position in the sequence. Less-negative (higher)\
  \ \nlogprob values indicate greater model confidence in that token choice.\n"
type: object
properties:
  logprob:
    description: 'The log probability of this token.

      '
    type: number
  token:
    description: A possible text token.
    type: string
  top_logprobs:
    description: 'The log probability of the top 20 most likely tokens.

      '
    items:
      properties:
        logprob:
          description: The log probability of this token.
          type: number
        token:
          description: A possible text token.
          type: string
      type: object
    type: array
required:
- token
- logprob
