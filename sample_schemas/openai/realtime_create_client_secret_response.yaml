$schema: http://json-schema.org/draft-07/schema#
title: RealtimeCreateClientSecretResponse
description: 'Response from creating a session and client secret for the Realtime
  API.

  '
type: object
properties:
  expires_at:
    description: Expiration timestamp for the client secret, in seconds since epoch.
    type: integer
  session:
    anyOf:
    - $ref: realtime_session_create_response_ga.yaml
    - $ref: realtime_transcription_session_create_response_ga.yaml
    description: 'The session configuration for either a realtime or transcription
      session.

      '
    discriminator:
      propertyName: type
    title: Session configuration
  value:
    description: The generated client secret value.
    type: string
required:
- value
- expires_at
- session
