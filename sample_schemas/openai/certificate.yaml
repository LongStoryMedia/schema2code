$schema: http://json-schema.org/draft-07/schema#
title: Certificate
description: Represents an individual `certificate` uploaded to the organization.
type: object
properties:
  active:
    description: Whether the certificate is currently active at the specified scope.
      Not returned when getting details for a specific certificate.
    type: boolean
  certificate_details:
    properties:
      content:
        description: The content of the certificate in PEM format.
        type: string
      expires_at:
        description: The Unix timestamp (in seconds) of when the certificate expires.
        type: integer
      valid_at:
        description: The Unix timestamp (in seconds) of when the certificate becomes
          valid.
        type: integer
    type: object
  created_at:
    description: The Unix timestamp (in seconds) of when the certificate was uploaded.
    type: integer
  id:
    description: The identifier, which can be referenced in API endpoints
    type: string
  name:
    description: The name of the certificate.
    type: string
  object:
    description: 'The object type.


      - If creating, updating, or getting a specific certificate, the object type
      is `certificate`.

      - If listing, activating, or deactivating certificates for the organization,
      the object type is `organization.certificate`.

      - If listing, activating, or deactivating certificates for a project, the object
      type is `organization.project.certificate`.

      '
    enum:
    - certificate
    - organization.certificate
    - organization.project.certificate
    type: string
required:
- object
- id
- name
- created_at
- certificate_details
