$schema: http://json-schema.org/draft-07/schema#
title: EvalResponsesSource
description: 'A EvalResponsesSource object describing a run data source configuration.

  '
type: object
properties:
  created_after:
    anyOf:
    - description: Only include items created after this timestamp (inclusive). This
        is a query parameter used to select responses.
      minimum: 0
      type: integer
    - type: 'null'
  created_before:
    anyOf:
    - description: Only include items created before this timestamp (inclusive). This
        is a query parameter used to select responses.
      minimum: 0
      type: integer
    - type: 'null'
  instructions_search:
    anyOf:
    - description: Optional string to search the 'instructions' field. This is a query
        parameter used to select responses.
      type: string
    - type: 'null'
  metadata:
    anyOf:
    - description: Metadata filter for the responses. This is a query parameter used
        to select responses.
      type: object
    - type: 'null'
  model:
    anyOf:
    - description: The name of the model to find responses for. This is a query parameter
        used to select responses.
      type: string
    - type: 'null'
  reasoning_effort:
    anyOf:
    - $ref: reasoning_effort.yaml
      description: Optional reasoning effort parameter. This is a query parameter
        used to select responses.
    - type: 'null'
  temperature:
    anyOf:
    - description: Sampling temperature. This is a query parameter used to select
        responses.
      type: number
    - type: 'null'
  tools:
    anyOf:
    - description: List of tool names. This is a query parameter used to select responses.
      items:
        type: string
      type: array
    - type: 'null'
  top_p:
    anyOf:
    - description: Nucleus sampling parameter. This is a query parameter used to select
        responses.
      type: number
    - type: 'null'
  type:
    description: The type of run data source. Always `responses`.
    enum:
    - responses
    type: string
  users:
    anyOf:
    - description: List of user identifiers. This is a query parameter used to select
        responses.
      items:
        type: string
      type: array
    - type: 'null'
required:
- type
