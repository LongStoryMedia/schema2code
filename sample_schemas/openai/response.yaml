$schema: http://json-schema.org/draft-07/schema#
title: Response
allOf:
- $ref: model_response_properties.yaml
- $ref: response_properties.yaml
- properties:
    completed_at:
      anyOf:
      - description: 'Unix timestamp (in seconds) of when this Response was completed.

          Only present when the status is `completed`.

          '
        type: number
      - type: 'null'
    conversation:
      anyOf:
      - $ref: conversation-2.yaml
      - type: 'null'
    created_at:
      description: 'Unix timestamp (in seconds) of when this Response was created.

        '
      type: number
    error:
      $ref: response_error.yaml
    id:
      description: 'Unique identifier for this Response.

        '
      type: string
    incomplete_details:
      anyOf:
      - description: 'Details about why the response is incomplete.

          '
        properties:
          reason:
            description: The reason why the response is incomplete.
            enum:
            - max_output_tokens
            - content_filter
            type: string
        type: object
      - type: 'null'
    instructions:
      anyOf:
      - anyOf:
        - description: 'A text input to the model, equivalent to a text input with
            the

            `developer` role.

            '
          type: string
        - description: 'A list of one or many input items to the model, containing

            different content types.

            '
          items:
            $ref: input_item.yaml
          title: Input item list
          type: array
        description: 'A system (or developer) message inserted into the model''s context.


          When using along with `previous_response_id`, the instructions from a previous

          response will not be carried over to the next response. This makes it simple

          to swap out system (or developer) messages in new responses.

          '
      - type: 'null'
    object:
      description: 'The object type of this resource - always set to `response`.

        '
      enum:
      - response
      type: string
    output:
      description: "An array of content items generated by the model.\n\n- The length\
        \ and order of items in the `output` array is dependent\n  on the model's\
        \ response.\n- Rather than accessing the first item in the `output` array\
        \ and\n  assuming it's an `assistant` message with the content generated by\n\
        \  the model, you might consider using the `output_text` property where\n\
        \  supported in SDKs.\n"
      items:
        $ref: output_item.yaml
      type: array
    output_text:
      anyOf:
      - description: 'SDK-only convenience property that contains the aggregated text
          output

          from all `output_text` items in the `output` array, if any are present.

          Supported in the Python and JavaScript SDKs.

          '
        type: string
      - type: 'null'
    parallel_tool_calls:
      default: true
      description: 'Whether to allow the model to run tool calls in parallel.

        '
      type: boolean
    status:
      description: 'The status of the response generation. One of `completed`, `failed`,

        `in_progress`, `cancelled`, `queued`, or `incomplete`.

        '
      enum:
      - completed
      - failed
      - in_progress
      - cancelled
      - queued
      - incomplete
      type: string
    usage:
      $ref: response_usage.yaml
  required:
  - id
  - object
  - created_at
  - error
  - incomplete_details
  - instructions
  - model
  - tools
  - output
  - parallel_tool_calls
  - metadata
  - tool_choice
  - temperature
  - top_p
  type: object
