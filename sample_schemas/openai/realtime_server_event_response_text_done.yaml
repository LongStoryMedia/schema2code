$schema: http://json-schema.org/draft-07/schema#
title: RealtimeServerEventResponseTextDone
description: 'Returned when the text value of an "output_text" content part is done
  streaming. Also

  emitted when a Response is interrupted, incomplete, or cancelled.

  '
type: object
properties:
  content_index:
    description: The index of the content part in the item's content array.
    type: integer
  event_id:
    description: The unique ID of the server event.
    type: string
  item_id:
    description: The ID of the item.
    type: string
  output_index:
    description: The index of the output item in the response.
    type: integer
  response_id:
    description: The ID of the response.
    type: string
  text:
    description: The final text content.
    type: string
  type:
    const: response.output_text.done
    description: The event type, must be `response.output_text.done`.
required:
- event_id
- type
- response_id
- item_id
- output_index
- content_index
- text
