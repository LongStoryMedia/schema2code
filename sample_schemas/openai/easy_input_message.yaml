$schema: http://json-schema.org/draft-07/schema#
title: EasyInputMessage
description: 'A message input to the model with a role indicating instruction following

  hierarchy. Instructions given with the `developer` or `system` role take

  precedence over instructions given with the `user` role. Messages with the

  `assistant` role are presumed to have been generated by the model in previous

  interactions.

  '
type: object
properties:
  content:
    anyOf:
    - description: 'A text input to the model.

        '
      title: Text input
      type: string
    - $ref: input_message_content_list.yaml
    description: 'Text, image, or audio input to the model, used to generate a response.

      Can also contain previous assistant responses.

      '
  role:
    description: 'The role of the message input. One of `user`, `assistant`, `system`,
      or

      `developer`.

      '
    enum:
    - user
    - assistant
    - system
    - developer
    type: string
  type:
    description: 'The type of the message input. Always `message`.

      '
    enum:
    - message
    type: string
required:
- role
- content
