$schema: http://json-schema.org/draft-07/schema#
title: AudioResponseFormat
description: 'The format of the output, in one of these options: `json`, `text`, `srt`,
  `verbose_json`, `vtt`, or `diarized_json`. For `gpt-4o-transcribe` and `gpt-4o-mini-transcribe`,
  the only supported format is `json`. For `gpt-4o-transcribe-diarize`, the supported
  formats are `json`, `text`, and `diarized_json`, with `diarized_json` required to
  receive speaker annotations.

  '
type: string
enum:
- json
- text
- srt
- verbose_json
- vtt
- diarized_json
default: json
