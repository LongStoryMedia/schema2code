$schema: http://json-schema.org/draft-07/schema#
title: FileExpirationAfter
description: The expiration policy for a file. By default, files with `purpose=batch`
  expire after 30 days and all other files are persisted until they are manually deleted.
type: object
properties:
  anchor:
    description: 'Anchor timestamp after which the expiration policy applies. Supported
      anchors: `created_at`.'
    enum:
    - created_at
    type: string
  seconds:
    description: The number of seconds after the anchor time that the file will expire.
      Must be between 3600 (1 hour) and 2592000 (30 days).
    maximum: 2592000
    minimum: 3600
    type: integer
required:
- anchor
- seconds
