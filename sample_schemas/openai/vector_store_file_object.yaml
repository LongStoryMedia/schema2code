$schema: http://json-schema.org/draft-07/schema#
title: VectorStoreFileObject
description: A list of files attached to a vector store.
type: object
properties:
  attributes:
    $ref: vector_store_file_attributes.yaml
  chunking_strategy:
    $ref: chunking_strategy_response.yaml
  created_at:
    description: The Unix timestamp (in seconds) for when the vector store file was
      created.
    type: integer
  id:
    description: The identifier, which can be referenced in API endpoints.
    type: string
  last_error:
    anyOf:
    - description: The last error associated with this vector store file. Will be
        `null` if there are no errors.
      properties:
        code:
          description: One of `server_error`, `unsupported_file`, or `invalid_file`.
          enum:
          - server_error
          - unsupported_file
          - invalid_file
          type: string
        message:
          description: A human-readable description of the error.
          type: string
      required:
      - code
      - message
      type: object
    - type: 'null'
  object:
    description: The object type, which is always `vector_store.file`.
    enum:
    - vector_store.file
    type: string
  status:
    description: The status of the vector store file, which can be either `in_progress`,
      `completed`, `cancelled`, or `failed`. The status `completed` indicates that
      the vector store file is ready for use.
    enum:
    - in_progress
    - completed
    - cancelled
    - failed
    type: string
  usage_bytes:
    description: The total vector store usage in bytes. Note that this may be different
      from the original file size.
    type: integer
  vector_store_id:
    description: The ID of the [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
      that the [File](https://platform.openai.com/docs/api-reference/files) is attached
      to.
    type: string
required:
- id
- object
- usage_bytes
- created_at
- vector_store_id
- status
- last_error
