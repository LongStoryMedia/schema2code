$schema: http://json-schema.org/draft-07/schema#
title: FunctionShellCall
description: A tool call that executes one or more shell commands in a managed environment.
type: object
properties:
  action:
    $ref: function_shell_action.yaml
    description: The shell commands and limits that describe how to run the tool call.
  call_id:
    description: The unique ID of the shell tool call generated by the model.
    type: string
  created_by:
    description: The ID of the entity that created this tool call.
    type: string
  id:
    description: The unique ID of the shell tool call. Populated when this item is
      returned via API.
    type: string
  status:
    $ref: local_shell_call_status.yaml
    description: The status of the shell call. One of `in_progress`, `completed`,
      or `incomplete`.
  type:
    default: shell_call
    description: The type of the item. Always `shell_call`.
    enum:
    - shell_call
    type: string
required:
- type
- id
- call_id
- action
- status
