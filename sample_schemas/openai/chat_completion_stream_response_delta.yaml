$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionStreamResponseDelta
description: A chat completion delta generated by streamed model responses.
type: object
properties:
  content:
    anyOf:
    - description: The contents of the chunk message.
      type: string
    - type: 'null'
  function_call:
    deprecated: true
    description: Deprecated and replaced by `tool_calls`. The name and arguments of
      a function that should be called, as generated by the model.
    properties:
      arguments:
        description: The arguments to call the function with, as generated by the
          model in JSON format. Note that the model does not always generate valid
          JSON, and may hallucinate parameters not defined by your function schema.
          Validate the arguments in your code before calling your function.
        type: string
      name:
        description: The name of the function to call.
        type: string
    type: object
  refusal:
    anyOf:
    - description: The refusal message generated by the model.
      type: string
    - type: 'null'
  role:
    description: The role of the author of this message.
    enum:
    - developer
    - system
    - user
    - assistant
    - tool
    type: string
  tool_calls:
    items:
      $ref: chat_completion_message_tool_call_chunk.yaml
    type: array
