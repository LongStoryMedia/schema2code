$schema: http://json-schema.org/draft-07/schema#
title: RealtimeClientEventResponseCancel
description: "Send this event to cancel an in-progress response. The server will respond\
  \ \nwith a `response.done` event with a status of `response.status=cancelled`. If\
  \ \nthere is no response to cancel, the server will respond with an error. It's\
  \ safe\nto call `response.cancel` even if no response is in progress, an error will\
  \ be\nreturned the session will remain unaffected.\n"
type: object
properties:
  event_id:
    description: Optional client-generated ID used to identify this event.
    maxLength: 512
    type: string
  response_id:
    description: "A specific response ID to cancel - if not provided, will cancel\
      \ an \nin-progress response in the default conversation.\n"
    type: string
  type:
    const: response.cancel
    description: The event type, must be `response.cancel`.
required:
- type
