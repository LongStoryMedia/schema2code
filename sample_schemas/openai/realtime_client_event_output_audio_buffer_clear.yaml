$schema: http://json-schema.org/draft-07/schema#
title: RealtimeClientEventOutputAudioBufferClear
description: '**WebRTC/SIP Only:** Emit to cut off the current audio response. This
  will trigger the server to

  stop generating audio and emit a `output_audio_buffer.cleared` event. This

  event should be preceded by a `response.cancel` client event to stop the

  generation of the current response.

  [Learn more](https://platform.openai.com/docs/guides/realtime-conversations#client-and-server-events-for-audio-in-webrtc).

  '
type: object
properties:
  event_id:
    description: The unique ID of the client event used for error handling.
    type: string
  type:
    const: output_audio_buffer.clear
    description: The event type, must be `output_audio_buffer.clear`.
required:
- type
