$schema: http://json-schema.org/draft-07/schema#
title: RealtimeBetaServerEventConversationItemInputAudioTranscriptionDelta
description: 'Returned when the text value of an input audio transcription content
  part is updated.

  '
type: object
properties:
  content_index:
    description: The index of the content part in the item's content array.
    type: integer
  delta:
    description: The text delta.
    type: string
  event_id:
    description: The unique ID of the server event.
    type: string
  item_id:
    description: The ID of the item.
    type: string
  logprobs:
    anyOf:
    - description: The log probabilities of the transcription.
      items:
        $ref: log_prob_properties.yaml
      type: array
    - type: 'null'
  type:
    const: conversation.item.input_audio_transcription.delta
    description: The event type, must be `conversation.item.input_audio_transcription.delta`.
required:
- event_id
- type
- item_id
