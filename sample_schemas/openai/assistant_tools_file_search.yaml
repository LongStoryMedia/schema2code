$schema: http://json-schema.org/draft-07/schema#
title: AssistantToolsFileSearch
type: object
properties:
  file_search:
    description: Overrides for the file search tool.
    properties:
      max_num_results:
        description: 'The maximum number of results the file search tool should output.
          The default is 20 for `gpt-4*` models and 5 for `gpt-3.5-turbo`. This number
          should be between 1 and 50 inclusive.


          Note that the file search tool may output fewer than `max_num_results` results.
          See the [file search tool documentation](https://platform.openai.com/docs/assistants/tools/file-search#customizing-file-search-settings)
          for more information.

          '
        maximum: 50
        minimum: 1
        type: integer
      ranking_options:
        $ref: file_search_ranking_options.yaml
    type: object
  type:
    description: 'The type of tool being defined: `file_search`'
    enum:
    - file_search
    type: string
required:
- type
