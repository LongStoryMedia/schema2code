$schema: http://json-schema.org/draft-07/schema#
title: ComparisonFilter
description: 'A filter used to compare a specified attribute key to a given value
  using a defined comparison operation.

  '
type: object
properties:
  key:
    description: The key to compare against the value.
    type: string
  type:
    default: eq
    description: 'Specifies the comparison operator: `eq`, `ne`, `gt`, `gte`, `lt`,
      `lte`, `in`, `nin`.

      - `eq`: equals

      - `ne`: not equal

      - `gt`: greater than

      - `gte`: greater than or equal

      - `lt`: less than

      - `lte`: less than or equal

      - `in`: in

      - `nin`: not in

      '
    enum:
    - eq
    - ne
    - gt
    - gte
    - lt
    - lte
    type: string
  value:
    anyOf:
    - type: string
    - type: number
    - type: boolean
    - items:
        $ref: comparison_filter_value_items.yaml
      type: array
    description: The value to compare against the attribute key; supports string,
      number, or boolean types.
required:
- type
- key
- value
additionalProperties: false
