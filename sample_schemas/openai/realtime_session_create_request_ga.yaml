$schema: http://json-schema.org/draft-07/schema#
title: RealtimeSessionCreateRequestGA
description: Realtime session object configuration.
type: object
properties:
  audio:
    description: 'Configuration for input and output audio.

      '
    properties:
      input:
        properties:
          format:
            $ref: realtime_audio_formats.yaml
            description: The format of the input audio.
          noise_reduction:
            description: 'Configuration for input audio noise reduction. This can
              be set to `null` to turn off.

              Noise reduction filters audio added to the input audio buffer before
              it is sent to VAD and the model.

              Filtering the audio can improve VAD and turn detection accuracy (reducing
              false positives) and model performance by improving perception of the
              input audio.

              '
            properties:
              type:
                $ref: noise_reduction_type.yaml
            type: object
          transcription:
            $ref: audio_transcription.yaml
            description: 'Configuration for input audio transcription, defaults to
              off and can be set to `null` to turn off once on. Input audio transcription
              is not native to the model, since the model consumes audio directly.
              Transcription runs asynchronously through [the /audio/transcriptions
              endpoint](https://platform.openai.com/docs/api-reference/audio/createTranscription)
              and should be treated as guidance of input audio content rather than
              precisely what the model heard. The client can optionally set the language
              and prompt for transcription, these offer additional guidance to the
              transcription service.

              '
          turn_detection:
            $ref: realtime_turn_detection.yaml
        type: object
      output:
        properties:
          format:
            $ref: realtime_audio_formats.yaml
            description: The format of the output audio.
          speed:
            default: 1
            description: 'The speed of the model''s spoken response as a multiple
              of the original speed.

              1.0 is the default speed. 0.25 is the minimum speed. 1.5 is the maximum
              speed. This value can only be changed in between model turns, not while
              a response is in progress.


              This parameter is a post-processing adjustment to the audio after it
              is generated, it''s

              also possible to prompt the model to speak faster or slower.

              '
            maximum: 1.5
            minimum: 0.25
            type: number
          voice:
            $ref: voice_ids_shared.yaml
            default: alloy
            description: The voice the model uses to respond. Supported built-in voices
              are `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`, `shimmer`, `verse`,
              `marin`, and `cedar`. Voice cannot be changed during the session once
              the model has responded with audio at least once. We recommend `marin`
              and `cedar` for best quality.
        type: object
    type: object
  include:
    description: 'Additional fields to include in server outputs.


      `item.input_audio_transcription.logprobs`: Include logprobs for input audio
      transcription.

      '
    items:
      enum:
      - item.input_audio_transcription.logprobs
      type: string
    type: array
  instructions:
    description: 'The default system instructions (i.e. system message) prepended
      to model calls. This field allows the client to guide the model on desired responses.
      The model can be instructed on response content and format, (e.g. "be extremely
      succinct", "act friendly", "here are examples of good responses") and on audio
      behavior (e.g. "talk quickly", "inject emotion into your voice", "laugh frequently").
      The instructions are not guaranteed to be followed by the model, but they provide
      guidance to the model on the desired behavior.


      Note that the server sets default instructions which will be used if this field
      is not set and are visible in the `session.created` event at the start of the
      session.

      '
    type: string
  max_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  model:
    anyOf:
    - type: string
    - enum:
      - gpt-realtime
      - gpt-realtime-2025-08-28
      - gpt-4o-realtime-preview
      - gpt-4o-realtime-preview-2024-10-01
      - gpt-4o-realtime-preview-2024-12-17
      - gpt-4o-realtime-preview-2025-06-03
      - gpt-4o-mini-realtime-preview
      - gpt-4o-mini-realtime-preview-2024-12-17
      - gpt-realtime-mini
      - gpt-realtime-mini-2025-10-06
      - gpt-realtime-mini-2025-12-15
      - gpt-audio-mini
      - gpt-audio-mini-2025-10-06
      - gpt-audio-mini-2025-12-15
      type: string
    description: 'The Realtime model used for this session.

      '
  output_modalities:
    default:
    - audio
    description: 'The set of modalities the model can respond with. It defaults to
      `["audio"]`, indicating

      that the model will respond with audio plus a transcript. `["text"]` can be
      used to make

      the model respond with text only. It is not possible to request both `text`
      and `audio` at the same time.

      '
    items:
      enum:
      - text
      - audio
      type: string
    type: array
  prompt:
    $ref: prompt.yaml
  tool_choice:
    anyOf:
    - $ref: tool_choice_options.yaml
    - $ref: tool_choice_function.yaml
    - $ref: tool_choice_mcp.yaml
    default: auto
    description: 'How the model chooses tools. Provide one of the string modes or
      force a specific

      function/MCP tool.

      '
  tools:
    description: Tools available to the model.
    items:
      anyOf:
      - $ref: realtime_function_tool.yaml
      - $ref: mcp_tool.yaml
      discriminator:
        propertyName: type
    type: array
  tracing:
    anyOf:
    - default: auto
      description: 'Enables tracing and sets default values for tracing configuration
        options. Always `auto`.

        '
      enum:
      - auto
      title: auto
      type: string
    - description: 'Granular configuration for tracing.

        '
      properties:
        group_id:
          description: 'The group id to attach to this trace to enable filtering and

            grouping in the Traces Dashboard.

            '
          type: string
        metadata:
          description: 'The arbitrary metadata to attach to this trace to enable

            filtering in the Traces Dashboard.

            '
          type: object
        workflow_name:
          description: 'The name of the workflow to attach to this trace. This is
            used to

            name the trace in the Traces Dashboard.

            '
          type: string
      title: Tracing Configuration
      type: object
    description: 'Realtime API can write session traces to the [Traces Dashboard](/logs?api=traces).
      Set to null to disable tracing. Once

      tracing is enabled for a session, the configuration cannot be modified.


      `auto` will create a trace for the session with default values for the

      workflow name, group id, and metadata.

      '
    nullable: true
    title: Tracing Configuration
  truncation:
    $ref: realtime_truncation.yaml
  type:
    description: 'The type of session to create. Always `realtime` for the Realtime
      API.

      '
    enum:
    - realtime
    type: string
required:
- type
