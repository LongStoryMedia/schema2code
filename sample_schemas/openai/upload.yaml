$schema: http://json-schema.org/draft-07/schema#
title: Upload
description: 'The Upload object can accept byte chunks in the form of Parts.

  '
type: object
properties:
  bytes:
    description: The intended number of bytes to be uploaded.
    type: integer
  created_at:
    description: The Unix timestamp (in seconds) for when the Upload was created.
    type: integer
  expires_at:
    description: The Unix timestamp (in seconds) for when the Upload will expire.
    type: integer
  file:
    allOf:
    - $ref: open_ai_file.yaml
    - description: The ready File object after the Upload is completed.
      nullable: true
  filename:
    description: The name of the file to be uploaded.
    type: string
  id:
    description: The Upload unique identifier, which can be referenced in API endpoints.
    type: string
  object:
    description: The object type, which is always "upload".
    enum:
    - upload
    type: string
  purpose:
    description: The intended purpose of the file. [Please refer here](https://platform.openai.com/docs/api-reference/files/object#files/object-purpose)
      for acceptable values.
    type: string
  status:
    description: The status of the Upload.
    enum:
    - pending
    - completed
    - cancelled
    - expired
    type: string
required:
- bytes
- created_at
- expires_at
- filename
- id
- purpose
- status
- object
