$schema: http://json-schema.org/draft-07/schema#
title: ResponseMCPCallArgumentsDeltaEvent
description: 'Emitted when there is a delta (partial update) to the arguments of an
  MCP tool call.

  '
type: object
properties:
  delta:
    description: 'A JSON string containing the partial update to the arguments for
      the MCP tool call.

      '
    type: string
  item_id:
    description: The unique identifier of the MCP tool call item being processed.
    type: string
  output_index:
    description: The index of the output item in the response's output array.
    type: integer
  sequence_number:
    description: The sequence number of this event.
    type: integer
  type:
    description: The type of the event. Always 'response.mcp_call_arguments.delta'.
    enum:
    - response.mcp_call_arguments.delta
    type: string
required:
- type
- output_index
- item_id
- delta
- sequence_number
