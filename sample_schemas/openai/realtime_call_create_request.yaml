$schema: http://json-schema.org/draft-07/schema#
title: RealtimeCallCreateRequest
description: 'Parameters required to initiate a realtime call and receive the SDP
  answer

  needed to complete a WebRTC peer connection. Provide an SDP offer generated

  by your client and optionally configure the session that will answer the call.'
type: object
properties:
  sdp:
    description: WebRTC Session Description Protocol (SDP) offer generated by the
      caller.
    type: string
  session:
    allOf:
    - $ref: realtime_session_create_request_ga.yaml
    description: 'Optional session configuration to apply before the realtime session
      is

      created. Use the same parameters you would send in a [`create client secret`](https://platform.openai.com/docs/api-reference/realtime-sessions/create-realtime-client-secret)

      request.'
    title: Session configuration
required:
- sdp
additionalProperties: false
