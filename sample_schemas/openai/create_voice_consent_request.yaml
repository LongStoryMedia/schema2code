$schema: http://json-schema.org/draft-07/schema#
title: CreateVoiceConsentRequest
type: object
properties:
  language:
    description: The BCP 47 language tag for the consent phrase (for example, `en-US`).
    type: string
  name:
    description: The label to use for this consent recording.
    type: string
  recording:
    description: 'The consent audio recording file. Maximum size is 10 MiB.


      Supported MIME types:

      `audio/mpeg`, `audio/wav`, `audio/x-wav`, `audio/ogg`, `audio/aac`, `audio/flac`,
      `audio/webm`, `audio/mp4`.

      '
    format: binary
    type: string
required:
- name
- recording
- language
additionalProperties: false
