$schema: http://json-schema.org/draft-07/schema#
title: FineTuningJobEvent
description: Fine-tuning job event object
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the fine-tuning job was
      created.
    type: integer
  data:
    description: The data associated with the event.
    type: object
  id:
    description: The object identifier.
    type: string
  level:
    description: The log level of the event.
    enum:
    - info
    - warn
    - error
    type: string
  message:
    description: The message of the event.
    type: string
  object:
    description: The object type, which is always "fine_tuning.job.event".
    enum:
    - fine_tuning.job.event
    type: string
  type:
    description: The type of event.
    enum:
    - message
    - metrics
    type: string
required:
- id
- object
- created_at
- level
- message
