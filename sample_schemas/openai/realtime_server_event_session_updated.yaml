$schema: http://json-schema.org/draft-07/schema#
title: RealtimeServerEventSessionUpdated
description: 'Returned when a session is updated with a `session.update` event, unless

  there is an error.

  '
type: object
properties:
  event_id:
    description: The unique ID of the server event.
    type: string
  session:
    anyOf:
    - $ref: realtime_session_create_request_ga.yaml
    - $ref: realtime_transcription_session_create_request_ga.yaml
    description: The session configuration.
  type:
    const: session.updated
    description: The event type, must be `session.updated`.
required:
- event_id
- type
- session
