$schema: http://json-schema.org/draft-07/schema#
title: CreateFineTuningJobRequest
type: object
properties:
  hyperparameters:
    deprecated: true
    description: 'The hyperparameters used for the fine-tuning job.

      This value is now deprecated in favor of `method`, and should be passed in under
      the `method` parameter.

      '
    properties:
      batch_size:
        anyOf:
        - enum:
          - auto
          title: Auto
          type: string
        - maximum: 256
          minimum: 1
          type: integer
        default: auto
        description: 'Number of examples in each batch. A larger batch size means
          that model parameters

          are updated less frequently, but with lower variance.

          '
      learning_rate_multiplier:
        anyOf:
        - enum:
          - auto
          title: Auto
          type: string
        - exclusiveMinimum: true
          minimum: 0
          type: number
        description: 'Scaling factor for the learning rate. A smaller learning rate
          may be useful to avoid

          overfitting.

          '
      n_epochs:
        anyOf:
        - enum:
          - auto
          title: Auto
          type: string
        - maximum: 50
          minimum: 1
          type: integer
        default: auto
        description: 'The number of epochs to train the model for. An epoch refers
          to one full cycle

          through the training dataset.

          '
    type: object
  integrations:
    description: A list of integrations to enable for your fine-tuning job.
    items:
      properties:
        type:
          anyOf:
          - enum:
            - wandb
            type: string
          description: 'The type of integration to enable. Currently, only "wandb"
            (Weights and Biases) is supported.

            '
        wandb:
          description: 'The settings for your integration with Weights and Biases.
            This payload specifies the project that

            metrics will be sent to. Optionally, you can set an explicit display name
            for your run, add tags

            to your run, and set a default entity (team, username, etc) to be associated
            with your run.

            '
          properties:
            entity:
              description: 'The entity to use for the run. This allows you to set
                the team or username of the WandB user that you would

                like associated with the run. If not set, the default entity for the
                registered WandB API key is used.

                '
              nullable: true
              type: string
            name:
              description: 'A display name to set for the run. If not set, we will
                use the Job ID as the name.

                '
              nullable: true
              type: string
            project:
              description: 'The name of the project that the new run will be created
                under.

                '
              example: my-wandb-project
              type: string
            tags:
              description: 'A list of tags to be attached to the newly created run.
                These tags are passed through directly to WandB. Some

                default tags are generated by OpenAI: "openai/finetune", "openai/{base-model}",
                "openai/{ftjob-abcdef}".

                '
              items:
                example: custom-tag
                type: string
              type: array
          required:
          - project
          type: object
      required:
      - type
      - wandb
      type: object
    nullable: true
    type: array
  metadata:
    $ref: metadata.yaml
  method:
    $ref: fine_tune_method.yaml
  model:
    anyOf:
    - type: string
    - enum:
      - babbage-002
      - davinci-002
      - gpt-3.5-turbo
      - gpt-4o-mini
      title: Preset
      type: string
    description: 'The name of the model to fine-tune. You can select one of the

      [supported models](https://platform.openai.com/docs/guides/fine-tuning#which-models-can-be-fine-tuned).

      '
    example: gpt-4o-mini
  seed:
    description: 'The seed controls the reproducibility of the job. Passing in the
      same seed and job parameters should produce the same results, but may differ
      in rare cases.

      If a seed is not specified, one will be generated for you.

      '
    example: 42
    maximum: 2147483647
    minimum: 0
    nullable: true
    type: integer
  suffix:
    default: null
    description: 'A string of up to 64 characters that will be added to your fine-tuned
      model name.


      For example, a `suffix` of "custom-model-name" would produce a model name like
      `ft:gpt-4o-mini:openai:custom-model-name:7p4lURel`.

      '
    maxLength: 64
    minLength: 1
    nullable: true
    type: string
  training_file:
    description: 'The ID of an uploaded file that contains training data.


      See [upload file](https://platform.openai.com/docs/api-reference/files/create)
      for how to upload a file.


      Your dataset must be formatted as a JSONL file. Additionally, you must upload
      your file with the purpose `fine-tune`.


      The contents of the file should differ depending on if the model uses the [chat](https://platform.openai.com/docs/api-reference/fine-tuning/chat-input),
      [completions](https://platform.openai.com/docs/api-reference/fine-tuning/completions-input)
      format, or if the fine-tuning method uses the [preference](https://platform.openai.com/docs/api-reference/fine-tuning/preference-input)
      format.


      See the [fine-tuning guide](https://platform.openai.com/docs/guides/model-optimization)
      for more details.

      '
    example: file-abc123
    type: string
  validation_file:
    description: 'The ID of an uploaded file that contains validation data.


      If you provide this file, the data is used to generate validation

      metrics periodically during fine-tuning. These metrics can be viewed in

      the fine-tuning results file.

      The same data should not be present in both train and validation files.


      Your dataset must be formatted as a JSONL file. You must upload your file with
      the purpose `fine-tune`.


      See the [fine-tuning guide](https://platform.openai.com/docs/guides/model-optimization)
      for more details.

      '
    example: file-abc123
    nullable: true
    type: string
required:
- model
- training_file
