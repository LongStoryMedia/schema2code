$schema: http://json-schema.org/draft-07/schema#
title: AssistantsNamedToolChoice
description: Specifies a tool the model should use. Use to force the model to call
  a specific tool.
type: object
properties:
  function:
    properties:
      name:
        description: The name of the function to call.
        type: string
    required:
    - name
    type: object
  type:
    description: The type of the tool. If type is `function`, the function name must
      be set
    enum:
    - function
    - code_interpreter
    - file_search
    type: string
required:
- type
