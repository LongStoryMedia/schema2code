$schema: http://json-schema.org/draft-07/schema#
title: ImageEditCompletedEvent
description: 'Emitted when image editing has completed and the final image is available.

  '
type: object
properties:
  b64_json:
    description: 'Base64-encoded final edited image data, suitable for rendering as
      an image.

      '
    type: string
  background:
    description: 'The background setting for the edited image.

      '
    enum:
    - transparent
    - opaque
    - auto
    type: string
  created_at:
    description: 'The Unix timestamp when the event was created.

      '
    type: integer
  output_format:
    description: 'The output format for the edited image.

      '
    enum:
    - png
    - webp
    - jpeg
    type: string
  quality:
    description: 'The quality setting for the edited image.

      '
    enum:
    - low
    - medium
    - high
    - auto
    type: string
  size:
    description: 'The size of the edited image.

      '
    enum:
    - 1024x1024
    - 1024x1536
    - 1536x1024
    - auto
    type: string
  type:
    description: 'The type of the event. Always `image_edit.completed`.

      '
    enum:
    - image_edit.completed
    type: string
  usage:
    $ref: images_usage.yaml
required:
- type
- b64_json
- created_at
- size
- quality
- background
- output_format
- usage
