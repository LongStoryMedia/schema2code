$schema: http://json-schema.org/draft-07/schema#
title: CreateThreadAndRunRequestWithoutStream
type: object
properties:
  assistant_id:
    description: The ID of the [assistant](https://platform.openai.com/docs/api-reference/assistants)
      to use to execute this run.
    type: string
  instructions:
    description: Override the default system message of the assistant. This is useful
      for modifying the behavior on a per-run basis.
    nullable: true
    type: string
  max_completion_tokens:
    description: 'The maximum number of completion tokens that may be used over the
      course of the run. The run will make a best effort to use only the number of
      completion tokens specified, across multiple turns of the run. If the run exceeds
      the number of completion tokens specified, the run will end with status `incomplete`.
      See `incomplete_details` for more info.

      '
    minimum: 256
    nullable: true
    type: integer
  max_prompt_tokens:
    description: 'The maximum number of prompt tokens that may be used over the course
      of the run. The run will make a best effort to use only the number of prompt
      tokens specified, across multiple turns of the run. If the run exceeds the number
      of prompt tokens specified, the run will end with status `incomplete`. See `incomplete_details`
      for more info.

      '
    minimum: 256
    nullable: true
    type: integer
  metadata:
    $ref: metadata.yaml
  model:
    anyOf:
    - type: string
    - enum:
      - gpt-5
      - gpt-5-mini
      - gpt-5-nano
      - gpt-5-2025-08-07
      - gpt-5-mini-2025-08-07
      - gpt-5-nano-2025-08-07
      - gpt-4.1
      - gpt-4.1-mini
      - gpt-4.1-nano
      - gpt-4.1-2025-04-14
      - gpt-4.1-mini-2025-04-14
      - gpt-4.1-nano-2025-04-14
      - gpt-4o
      - gpt-4o-2024-11-20
      - gpt-4o-2024-08-06
      - gpt-4o-2024-05-13
      - gpt-4o-mini
      - gpt-4o-mini-2024-07-18
      - gpt-4.5-preview
      - gpt-4.5-preview-2025-02-27
      - gpt-4-turbo
      - gpt-4-turbo-2024-04-09
      - gpt-4-0125-preview
      - gpt-4-turbo-preview
      - gpt-4-1106-preview
      - gpt-4-vision-preview
      - gpt-4
      - gpt-4-0314
      - gpt-4-0613
      - gpt-4-32k
      - gpt-4-32k-0314
      - gpt-4-32k-0613
      - gpt-3.5-turbo
      - gpt-3.5-turbo-16k
      - gpt-3.5-turbo-0613
      - gpt-3.5-turbo-1106
      - gpt-3.5-turbo-0125
      - gpt-3.5-turbo-16k-0613
      type: string
    description: The ID of the [Model](https://platform.openai.com/docs/api-reference/models)
      to be used to execute this run. If a value is provided here, it will override
      the model associated with the assistant. If not, the model associated with the
      assistant will be used.
    nullable: true
  parallel_tool_calls:
    $ref: parallel_tool_calls.yaml
  response_format:
    $ref: assistants_api_response_format_option.yaml
    nullable: true
  temperature:
    default: 1
    description: 'What sampling temperature to use, between 0 and 2. Higher values
      like 0.8 will make the output more random, while lower values like 0.2 will
      make it more focused and deterministic.

      '
    example: 1
    maximum: 2
    minimum: 0
    nullable: true
    type: number
  thread:
    $ref: create_thread_request.yaml
  tool_choice:
    allOf:
    - $ref: assistants_api_tool_choice_option.yaml
    - nullable: true
  tool_resources:
    description: 'A set of resources that are used by the assistant''s tools. The
      resources are specific to the type of tool. For example, the `code_interpreter`
      tool requires a list of file IDs, while the `file_search` tool requires a list
      of vector store IDs.

      '
    nullable: true
    properties:
      code_interpreter:
        properties:
          file_ids:
            default: []
            description: 'A list of [file](https://platform.openai.com/docs/api-reference/files)
              IDs made available to the `code_interpreter` tool. There can be a maximum
              of 20 files associated with the tool.

              '
            items:
              type: string
            maxItems: 20
            type: array
        type: object
      file_search:
        properties:
          vector_store_ids:
            description: 'The ID of the [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
              attached to this assistant. There can be a maximum of 1 vector store
              attached to the assistant.

              '
            items:
              type: string
            maxItems: 1
            type: array
        type: object
    type: object
  tools:
    description: Override the tools the assistant can use for this run. This is useful
      for modifying the behavior on a per-run basis.
    items:
      $ref: assistant_tool.yaml
    maxItems: 20
    nullable: true
    type: array
  top_p:
    default: 1
    description: 'An alternative to sampling with temperature, called nucleus sampling,
      where the model considers the results of the tokens with top_p probability mass.
      So 0.1 means only the tokens comprising the top 10% probability mass are considered.


      We generally recommend altering this or temperature but not both.

      '
    example: 1
    maximum: 1
    minimum: 0
    nullable: true
    type: number
  truncation_strategy:
    allOf:
    - $ref: truncation_object.yaml
    - nullable: true
required:
- assistant_id
additionalProperties: false
