$schema: http://json-schema.org/draft-07/schema#
title: ChatCompletionRequestMessageContentPartFile
description: 'Learn about [file inputs](https://platform.openai.com/docs/guides/text)
  for text generation.

  '
type: object
properties:
  file:
    properties:
      file_data:
        description: "The base64 encoded file data, used when passing the file to\
          \ the model \nas a string.\n"
        type: string
      file_id:
        description: 'The ID of an uploaded file to use as input.

          '
        type: string
      filename:
        description: "The name of the file, used when passing the file to the model\
          \ as a \nstring.\n"
        type: string
    type: object
  type:
    description: The type of the content part. Always `file`.
    enum:
    - file
    type: string
required:
- type
- file
