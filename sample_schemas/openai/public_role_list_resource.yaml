$schema: http://json-schema.org/draft-07/schema#
title: PublicRoleListResource
description: Paginated list of roles available on an organization or project.
type: object
properties:
  data:
    description: Roles returned in the current page.
    items:
      $ref: role.yaml
    type: array
  has_more:
    description: Whether more roles are available when paginating.
    type: boolean
  next:
    anyOf:
    - type: string
    - type: 'null'
    description: Cursor to fetch the next page of results, or `null` when there are
      no additional roles.
  object:
    description: Always `list`.
    enum:
    - list
    type: string
required:
- object
- data
- has_more
- next
