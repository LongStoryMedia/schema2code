$schema: http://json-schema.org/draft-07/schema#
title: SubmitToolOutputsRunRequest
type: object
properties:
  stream:
    anyOf:
    - description: 'If `true`, returns a stream of events that happen during the Run
        as server-sent events, terminating when the Run enters a terminal state with
        a `data: [DONE]` message.

        '
      type: boolean
    - type: 'null'
  tool_outputs:
    description: A list of tools for which the outputs are being submitted.
    items:
      properties:
        output:
          description: The output of the tool call to be submitted to continue the
            run.
          type: string
        tool_call_id:
          description: The ID of the tool call in the `required_action` object within
            the run object the output is being submitted for.
          type: string
      type: object
    type: array
required:
- tool_outputs
additionalProperties: false
