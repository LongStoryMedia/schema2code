$schema: http://json-schema.org/draft-07/schema#
title: CreateCompletionRequest
type: object
properties:
  best_of:
    default: 1
    description: 'Generates `best_of` completions server-side and returns the "best"
      (the one with the highest log probability per token). Results cannot be streamed.


      When used with `n`, `best_of` controls the number of candidate completions and
      `n` specifies how many to return – `best_of` must be greater than `n`.


      **Note:** Because this parameter generates many completions, it can quickly
      consume your token quota. Use carefully and ensure that you have reasonable
      settings for `max_tokens` and `stop`.

      '
    maximum: 20
    minimum: 0
    nullable: true
    type: integer
  echo:
    default: false
    description: 'Echo back the prompt in addition to the completion

      '
    nullable: true
    type: boolean
  frequency_penalty:
    default: 0
    description: 'Number between -2.0 and 2.0. Positive values penalize new tokens
      based on their existing frequency in the text so far, decreasing the model''s
      likelihood to repeat the same line verbatim.


      [See more information about frequency and presence penalties.](https://platform.openai.com/docs/guides/text-generation)

      '
    maximum: 2
    minimum: -2
    nullable: true
    type: number
  logit_bias:
    additionalProperties:
      type: integer
    default: null
    description: 'Modify the likelihood of specified tokens appearing in the completion.


      Accepts a JSON object that maps tokens (specified by their token ID in the GPT
      tokenizer) to an associated bias value from -100 to 100. You can use this [tokenizer
      tool](/tokenizer?view=bpe) to convert text to token IDs. Mathematically, the
      bias is added to the logits generated by the model prior to sampling. The exact
      effect will vary per model, but values between -1 and 1 should decrease or increase
      likelihood of selection; values like -100 or 100 should result in a ban or exclusive
      selection of the relevant token.


      As an example, you can pass `{"50256": -100}` to prevent the <|endoftext|> token
      from being generated.

      '
    nullable: true
    type: object
  logprobs:
    default: null
    description: 'Include the log probabilities on the `logprobs` most likely output
      tokens, as well the chosen tokens. For example, if `logprobs` is 5, the API
      will return a list of the 5 most likely tokens. The API will always return the
      `logprob` of the sampled token, so there may be up to `logprobs+1` elements
      in the response.


      The maximum value for `logprobs` is 5.

      '
    maximum: 5
    minimum: 0
    nullable: true
    type: integer
  max_tokens:
    default: 16
    description: 'The maximum number of [tokens](/tokenizer) that can be generated
      in the completion.


      The token count of your prompt plus `max_tokens` cannot exceed the model''s
      context length. [Example Python code](https://cookbook.openai.com/examples/how_to_count_tokens_with_tiktoken)
      for counting tokens.

      '
    example: 16
    minimum: 0
    nullable: true
    type: integer
  model:
    anyOf:
    - type: string
    - enum:
      - gpt-3.5-turbo-instruct
      - davinci-002
      - babbage-002
      title: Preset
      type: string
    description: 'ID of the model to use. You can use the [List models](https://platform.openai.com/docs/api-reference/models/list)
      API to see all of your available models, or see our [Model overview](https://platform.openai.com/docs/models)
      for descriptions of them.

      '
  n:
    default: 1
    description: 'How many completions to generate for each prompt.


      **Note:** Because this parameter generates many completions, it can quickly
      consume your token quota. Use carefully and ensure that you have reasonable
      settings for `max_tokens` and `stop`.

      '
    example: 1
    maximum: 128
    minimum: 1
    nullable: true
    type: integer
  presence_penalty:
    default: 0
    description: 'Number between -2.0 and 2.0. Positive values penalize new tokens
      based on whether they appear in the text so far, increasing the model''s likelihood
      to talk about new topics.


      [See more information about frequency and presence penalties.](https://platform.openai.com/docs/guides/text-generation)

      '
    maximum: 2
    minimum: -2
    nullable: true
    type: number
  prompt:
    anyOf:
    - default: ''
      example: This is a test.
      type: string
    - items:
        default: ''
        example: This is a test.
        type: string
      title: Array of strings
      type: array
    - items:
        type: integer
      minItems: 1
      title: Array of tokens
      type: array
    - items:
        items:
          type: integer
        minItems: 1
        type: array
      minItems: 1
      title: Array of token arrays
      type: array
    description: 'The prompt(s) to generate completions for, encoded as a string,
      array of strings, array of tokens, or array of token arrays.


      Note that <|endoftext|> is the document separator that the model sees during
      training, so if a prompt is not specified the model will generate as if from
      the beginning of a new document.

      '
    nullable: true
  seed:
    description: 'If specified, our system will make a best effort to sample deterministically,
      such that repeated requests with the same `seed` and parameters should return
      the same result.


      Determinism is not guaranteed, and you should refer to the `system_fingerprint`
      response parameter to monitor changes in the backend.

      '
    format: int64
    nullable: true
    type: integer
  stop:
    $ref: stop_configuration.yaml
  stream:
    default: false
    description: 'Whether to stream back partial progress. If set, tokens will be
      sent as data-only [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format)
      as they become available, with the stream terminated by a `data: [DONE]` message.
      [Example Python code](https://cookbook.openai.com/examples/how_to_stream_completions).

      '
    nullable: true
    type: boolean
  stream_options:
    $ref: chat_completion_stream_options.yaml
  suffix:
    default: null
    description: 'The suffix that comes after a completion of inserted text.


      This parameter is only supported for `gpt-3.5-turbo-instruct`.

      '
    example: test.
    nullable: true
    type: string
  temperature:
    default: 1
    description: 'What sampling temperature to use, between 0 and 2. Higher values
      like 0.8 will make the output more random, while lower values like 0.2 will
      make it more focused and deterministic.


      We generally recommend altering this or `top_p` but not both.

      '
    example: 1
    maximum: 2
    minimum: 0
    nullable: true
    type: number
  top_p:
    default: 1
    description: 'An alternative to sampling with temperature, called nucleus sampling,
      where the model considers the results of the tokens with top_p probability mass.
      So 0.1 means only the tokens comprising the top 10% probability mass are considered.


      We generally recommend altering this or `temperature` but not both.

      '
    example: 1
    maximum: 1
    minimum: 0
    nullable: true
    type: number
  user:
    description: 'A unique identifier representing your end-user, which can help OpenAI
      to monitor and detect abuse. [Learn more](https://platform.openai.com/docs/guides/safety-best-practices#end-user-ids).

      '
    example: user-1234
    type: string
required:
- model
- prompt
