$schema: http://json-schema.org/draft-07/schema#
title: ProjectCreateRequest
type: object
properties:
  geography:
    description: Create the project with the specified data residency region. Your
      organization must have access to Data residency functionality in order to use.
      See [data residency controls](https://platform.openai.com/docs/guides/your-data#data-residency-controls)
      to review the functionality and limitations of setting this field.
    enum:
    - US
    - EU
    - JP
    - IN
    - KR
    - CA
    - AU
    - SG
    type: string
  name:
    description: The friendly name of the project, this name appears in reports.
    type: string
required:
- name
