$schema: http://json-schema.org/draft-07/schema#
title: RealtimeSession
description: Realtime session object for the beta interface.
type: object
properties:
  expires_at:
    description: Expiration timestamp for the session, in seconds since epoch.
    type: integer
  id:
    description: 'Unique identifier for the session that looks like `sess_1234567890abcdef`.

      '
    type: string
  include:
    anyOf:
    - description: 'Additional fields to include in server outputs.

        - `item.input_audio_transcription.logprobs`: Include logprobs for input audio
        transcription.

        '
      items:
        enum:
        - item.input_audio_transcription.logprobs
        type: string
      type: array
    - type: 'null'
  input_audio_format:
    default: pcm16
    description: 'The format of input audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      For `pcm16`, input audio must be 16-bit PCM at a 24kHz sample rate,

      single channel (mono), and little-endian byte order.

      '
    enum:
    - pcm16
    - g711_ulaw
    - g711_alaw
    type: string
  input_audio_noise_reduction:
    description: 'Configuration for input audio noise reduction. This can be set to
      `null` to turn off.

      Noise reduction filters audio added to the input audio buffer before it is sent
      to VAD and the model.

      Filtering the audio can improve VAD and turn detection accuracy (reducing false
      positives) and model performance by improving perception of the input audio.

      '
    properties:
      type:
        $ref: noise_reduction_type.yaml
    type: object
  input_audio_transcription:
    anyOf:
    - allOf:
      - $ref: audio_transcription.yaml
      description: 'Configuration for input audio transcription, defaults to off and
        can be set to `null` to turn off once on. Input audio transcription is not
        native to the model, since the model consumes audio directly. Transcription
        runs asynchronously through [the /audio/transcriptions endpoint](https://platform.openai.com/docs/api-reference/audio/createTranscription)
        and should be treated as guidance of input audio content rather than precisely
        what the model heard. The client can optionally set the language and prompt
        for transcription, these offer additional guidance to the transcription service.

        '
    - type: 'null'
  instructions:
    description: 'The default system instructions (i.e. system message) prepended
      to model

      calls. This field allows the client to guide the model on desired

      responses. The model can be instructed on response content and format,

      (e.g. "be extremely succinct", "act friendly", "here are examples of good

      responses") and on audio behavior (e.g. "talk quickly", "inject emotion

      into your voice", "laugh frequently"). The instructions are not

      guaranteed to be followed by the model, but they provide guidance to the

      model on the desired behavior.



      Note that the server sets default instructions which will be used if this

      field is not set and are visible in the `session.created` event at the

      start of the session.

      '
    type: string
  max_response_output_tokens:
    anyOf:
    - type: integer
    - enum:
      - inf
      type: string
    description: 'Maximum number of output tokens for a single assistant response,

      inclusive of tool calls. Provide an integer between 1 and 4096 to

      limit output tokens, or `inf` for the maximum available tokens for a

      given model. Defaults to `inf`.

      '
  modalities:
    description: 'The set of modalities the model can respond with. To disable audio,

      set this to ["text"].

      '
    items:
      enum:
      - text
      - audio
      type: string
  model:
    anyOf:
    - type: string
    - enum:
      - gpt-realtime
      - gpt-realtime-2025-08-28
      - gpt-4o-realtime-preview
      - gpt-4o-realtime-preview-2024-10-01
      - gpt-4o-realtime-preview-2024-12-17
      - gpt-4o-realtime-preview-2025-06-03
      - gpt-4o-mini-realtime-preview
      - gpt-4o-mini-realtime-preview-2024-12-17
      - gpt-realtime-mini
      - gpt-realtime-mini-2025-10-06
      - gpt-realtime-mini-2025-12-15
      - gpt-audio-mini
      - gpt-audio-mini-2025-10-06
      - gpt-audio-mini-2025-12-15
      type: string
    description: 'The Realtime model used for this session.

      '
  object:
    description: The object type. Always `realtime.session`.
    enum:
    - realtime.session
    type: string
  output_audio_format:
    default: pcm16
    description: 'The format of output audio. Options are `pcm16`, `g711_ulaw`, or
      `g711_alaw`.

      For `pcm16`, output audio is sampled at a rate of 24kHz.

      '
    enum:
    - pcm16
    - g711_ulaw
    - g711_alaw
    type: string
  prompt:
    anyOf:
    - $ref: prompt.yaml
    - type: 'null'
  speed:
    default: 1
    description: 'The speed of the model''s spoken response. 1.0 is the default speed.
      0.25 is

      the minimum speed. 1.5 is the maximum speed. This value can only be changed

      in between model turns, not while a response is in progress.

      '
    maximum: 1.5
    minimum: 0.25
    type: number
  temperature:
    default: 0.8
    description: 'Sampling temperature for the model, limited to [0.6, 1.2]. For audio
      models a temperature of 0.8 is highly recommended for best performance.

      '
    type: number
  tool_choice:
    default: auto
    description: 'How the model chooses tools. Options are `auto`, `none`, `required`,
      or

      specify a function.

      '
    type: string
  tools:
    description: Tools (functions) available to the model.
    items:
      $ref: realtime_function_tool.yaml
    type: array
  tracing:
    anyOf:
    - anyOf:
      - default: auto
        description: 'Default tracing mode for the session.

          '
        enum:
        - auto
        type: string
      - description: 'Granular configuration for tracing.

          '
        properties:
          group_id:
            description: 'The group id to attach to this trace to enable filtering
              and

              grouping in the traces dashboard.

              '
            type: string
          metadata:
            description: 'The arbitrary metadata to attach to this trace to enable

              filtering in the traces dashboard.

              '
            type: object
          workflow_name:
            description: 'The name of the workflow to attach to this trace. This is
              used to

              name the trace in the traces dashboard.

              '
            type: string
        title: Tracing Configuration
        type: object
      description: 'Configuration options for tracing. Set to null to disable tracing.
        Once

        tracing is enabled for a session, the configuration cannot be modified.


        `auto` will create a trace for the session with default values for the

        workflow name, group id, and metadata.

        '
      title: Tracing Configuration
    - type: 'null'
  turn_detection:
    $ref: realtime_turn_detection.yaml
  voice:
    $ref: voice_ids_shared.yaml
    description: 'The voice the model uses to respond. Voice cannot be changed during
      the

      session once the model has responded with audio at least once. Current

      voice options are `alloy`, `ash`, `ballad`, `coral`, `echo`, `sage`,

      `shimmer`, and `verse`.

      '
