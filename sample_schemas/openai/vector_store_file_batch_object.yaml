$schema: http://json-schema.org/draft-07/schema#
title: VectorStoreFileBatchObject
description: A batch of files attached to a vector store.
type: object
properties:
  created_at:
    description: The Unix timestamp (in seconds) for when the vector store files batch
      was created.
    type: integer
  file_counts:
    properties:
      cancelled:
        description: The number of files that where cancelled.
        type: integer
      completed:
        description: The number of files that have been processed.
        type: integer
      failed:
        description: The number of files that have failed to process.
        type: integer
      in_progress:
        description: The number of files that are currently being processed.
        type: integer
      total:
        description: The total number of files.
        type: integer
    required:
    - in_progress
    - completed
    - cancelled
    - failed
    - total
    type: object
  id:
    description: The identifier, which can be referenced in API endpoints.
    type: string
  object:
    description: The object type, which is always `vector_store.file_batch`.
    enum:
    - vector_store.files_batch
    type: string
  status:
    description: The status of the vector store files batch, which can be either `in_progress`,
      `completed`, `cancelled` or `failed`.
    enum:
    - in_progress
    - completed
    - cancelled
    - failed
    type: string
  vector_store_id:
    description: The ID of the [vector store](https://platform.openai.com/docs/api-reference/vector-stores/object)
      that the [File](https://platform.openai.com/docs/api-reference/files) is attached
      to.
    type: string
required:
- id
- object
- created_at
- vector_store_id
- status
- file_counts
