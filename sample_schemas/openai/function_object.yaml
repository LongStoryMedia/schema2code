$schema: http://json-schema.org/draft-07/schema#
title: FunctionObject
type: object
properties:
  description:
    description: A description of what the function does, used by the model to choose
      when and how to call the function.
    type: string
  name:
    description: The name of the function to be called. Must be a-z, A-Z, 0-9, or
      contain underscores and dashes, with a maximum length of 64.
    type: string
  parameters:
    $ref: function_parameters.yaml
  strict:
    anyOf:
    - default: false
      description: Whether to enable strict schema adherence when generating the function
        call. If set to true, the model will follow the exact schema defined in the
        `parameters` field. Only a subset of JSON Schema is supported when `strict`
        is `true`. Learn more about Structured Outputs in the [function calling guide](https://platform.openai.com/docs/guides/function-calling).
      type: boolean
    - type: 'null'
required:
- name
