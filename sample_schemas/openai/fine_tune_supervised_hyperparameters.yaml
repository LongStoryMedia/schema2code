$schema: http://json-schema.org/draft-07/schema#
title: FineTuneSupervisedHyperparameters
description: The hyperparameters used for the fine-tuning job.
type: object
properties:
  batch_size:
    anyOf:
    - enum:
      - auto
      type: string
    - maximum: 256
      minimum: 1
      type: integer
    default: auto
    description: 'Number of examples in each batch. A larger batch size means that
      model parameters are updated less frequently, but with lower variance.

      '
  learning_rate_multiplier:
    anyOf:
    - enum:
      - auto
      type: string
    - exclusiveMinimum: true
      minimum: 0
      type: number
    description: 'Scaling factor for the learning rate. A smaller learning rate may
      be useful to avoid overfitting.

      '
  n_epochs:
    anyOf:
    - enum:
      - auto
      type: string
    - maximum: 50
      minimum: 1
      type: integer
    default: auto
    description: 'The number of epochs to train the model for. An epoch refers to
      one full cycle through the training dataset.

      '
