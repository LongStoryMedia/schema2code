$schema: http://json-schema.org/draft-07/schema#
title: RealtimeConversationItemFunctionCallOutput
description: A function call output item in a Realtime conversation.
type: object
properties:
  call_id:
    description: The ID of the function call this output is for.
    type: string
  id:
    description: The unique ID of the item. This may be provided by the client or
      generated by the server.
    type: string
  object:
    description: Identifier for the API object being returned - always `realtime.item`.
      Optional when creating a new item.
    enum:
    - realtime.item
    type: string
  output:
    description: The output of the function call, this is free text and can contain
      any information or simply be empty.
    type: string
  status:
    description: The status of the item. Has no effect on the conversation.
    enum:
    - completed
    - incomplete
    - in_progress
    type: string
  type:
    description: The type of the item. Always `function_call_output`.
    enum:
    - function_call_output
    type: string
required:
- type
- call_id
- output
