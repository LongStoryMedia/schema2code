$schema: http://json-schema.org/draft-07/schema#
title: GraderTextSimilarity
description: 'A TextSimilarityGrader object which grades text based on similarity
  metrics.

  '
type: object
properties:
  evaluation_metric:
    description: "The evaluation metric to use. One of `cosine`, `fuzzy_match`, `bleu`,\
      \ \n`gleu`, `meteor`, `rouge_1`, `rouge_2`, `rouge_3`, `rouge_4`, `rouge_5`,\
      \ \nor `rouge_l`.\n"
    enum:
    - cosine
    - fuzzy_match
    - bleu
    - gleu
    - meteor
    - rouge_1
    - rouge_2
    - rouge_3
    - rouge_4
    - rouge_5
    - rouge_l
    type: string
  input:
    description: The text being graded.
    type: string
  name:
    description: The name of the grader.
    type: string
  reference:
    description: The text being graded against.
    type: string
  type:
    default: text_similarity
    description: The type of grader.
    enum:
    - text_similarity
    type: string
required:
- type
- name
- input
- reference
- evaluation_metric
