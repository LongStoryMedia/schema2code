$schema: http://json-schema.org/draft-07/schema#
title: Message
description: A message to or from the model.
type: object
properties:
  content:
    description: The content of the message
    items:
      anyOf:
      - $ref: input_text_content.yaml
      - $ref: output_text_content.yaml
      - $ref: text_content.yaml
      - $ref: summary_text_content.yaml
      - $ref: reasoning_text_content.yaml
      - $ref: refusal_content.yaml
      - $ref: input_image_content.yaml
      - $ref: computer_screenshot_content.yaml
      - $ref: input_file_content.yaml
      description: A content part that makes up an input or output item.
      discriminator:
        propertyName: type
    type: array
  id:
    description: The unique ID of the message.
    type: string
  role:
    $ref: message_role.yaml
    description: The role of the message. One of `unknown`, `user`, `assistant`, `system`,
      `critic`, `discriminator`, `developer`, or `tool`.
  status:
    $ref: message_status.yaml
    description: The status of item. One of `in_progress`, `completed`, or `incomplete`.
      Populated when items are returned via API.
  type:
    default: message
    description: The type of the message. Always set to `message`.
    enum:
    - message
    type: string
required:
- type
- id
- status
- role
- content
