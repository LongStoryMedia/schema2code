$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: ToolSimilarity
description: "Represents similarity analysis between two tools"
properties:
  tool:
    $ref: "dynamic_tool.yaml"
    description: "The tool being compared"
  overall_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Overall similarity score (0-1)"
  name_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Name similarity score (0-1)"
  description_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Description similarity score (0-1)"
  code_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Code similarity score (0-1)"
  parameter_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Parameter similarity score (0-1)"
  semantic_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Semantic similarity score from embeddings (0-1)"
  reasons:
    type: array
    items:
      type: string
    description: "List of reasons for the similarity assessment"
required:
  - tool
  - overall_similarity
  - name_similarity
  - description_similarity
  - code_similarity
  - parameter_similarity
  - semantic_similarity
  - reasons
additionalProperties: false
