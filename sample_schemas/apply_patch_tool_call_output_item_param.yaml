$schema: http://json-schema.org/draft-07/schema#
title: ApplyPatchToolCallOutputItemParam
description: The streamed output emitted by an apply patch tool call.
type: object
properties:
  call_id:
    description: The unique ID of the apply patch tool call generated by the model.
    maxLength: 64
    minLength: 1
    type: string
  id:
    anyOf:
    - description: The unique ID of the apply patch tool call output. Populated when
        this item is returned via API.
      example: apco_123
      type: string
    - type: 'null'
  output:
    anyOf:
    - description: Optional human-readable log text from the apply patch tool (e.g.,
        patch results or errors).
      maxLength: 10485760
      type: string
    - type: 'null'
  status:
    $ref: apply_patch_call_output_status_param.yaml
    description: The status of the apply patch tool call output. One of `completed`
      or `failed`.
  type:
    default: apply_patch_call_output
    description: The type of the item. Always `apply_patch_call_output`.
    enum:
    - apply_patch_call_output
    type: string
required:
- type
- call_id
- status
