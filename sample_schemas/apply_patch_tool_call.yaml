$schema: http://json-schema.org/draft-07/schema#
title: ApplyPatchToolCall
description: A tool call that applies file diffs by creating, deleting, or updating
  files.
type: object
properties:
  call_id:
    description: The unique ID of the apply patch tool call generated by the model.
    type: string
  created_by:
    description: The ID of the entity that created this tool call.
    type: string
  id:
    description: The unique ID of the apply patch tool call. Populated when this item
      is returned via API.
    type: string
  operation:
    anyOf:
    - $ref: apply_patch_create_file_operation.yaml
    - $ref: apply_patch_delete_file_operation.yaml
    - $ref: apply_patch_update_file_operation.yaml
    description: One of the create_file, delete_file, or update_file operations applied
      via apply_patch.
    discriminator:
      propertyName: type
    title: Apply patch operation
  status:
    $ref: apply_patch_call_status.yaml
    description: The status of the apply patch tool call. One of `in_progress` or
      `completed`.
  type:
    default: apply_patch_call
    description: The type of the item. Always `apply_patch_call`.
    enum:
    - apply_patch_call
    type: string
required:
- type
- id
- call_id
- status
- operation
