$schema: http://json-schema.org/draft-07/schema#
title: Batch
type: object
properties:
  cancelled_at:
    description: The Unix timestamp (in seconds) for when the batch was cancelled.
    type: integer
  cancelling_at:
    description: The Unix timestamp (in seconds) for when the batch started cancelling.
    type: integer
  completed_at:
    description: The Unix timestamp (in seconds) for when the batch was completed.
    type: integer
  completion_window:
    description: The time frame within which the batch should be processed.
    type: string
  created_at:
    description: The Unix timestamp (in seconds) for when the batch was created.
    type: integer
  endpoint:
    description: The OpenAI API endpoint used by the batch.
    type: string
  error_file_id:
    description: The ID of the file containing the outputs of requests with errors.
    type: string
  errors:
    properties:
      data:
        items:
          $ref: batch_error.yaml
        type: array
      object:
        description: The object type, which is always `list`.
        type: string
    type: object
  expired_at:
    description: The Unix timestamp (in seconds) for when the batch expired.
    type: integer
  expires_at:
    description: The Unix timestamp (in seconds) for when the batch will expire.
    type: integer
  failed_at:
    description: The Unix timestamp (in seconds) for when the batch failed.
    type: integer
  finalizing_at:
    description: The Unix timestamp (in seconds) for when the batch started finalizing.
    type: integer
  id:
    type: string
  in_progress_at:
    description: The Unix timestamp (in seconds) for when the batch started processing.
    type: integer
  input_file_id:
    description: The ID of the input file for the batch.
    type: string
  metadata:
    $ref: metadata.yaml
  model:
    description: 'Model ID used to process the batch, like `gpt-5-2025-08-07`. OpenAI

      offers a wide range of models with different capabilities, performance

      characteristics, and price points. Refer to the [model

      guide](https://platform.openai.com/docs/models) to browse and compare available
      models.

      '
    type: string
  object:
    description: The object type, which is always `batch`.
    enum:
    - batch
    type: string
  output_file_id:
    description: The ID of the file containing the outputs of successfully executed
      requests.
    type: string
  request_counts:
    $ref: batch_request_counts.yaml
  status:
    description: The current status of the batch.
    enum:
    - validating
    - failed
    - in_progress
    - finalizing
    - completed
    - expired
    - cancelling
    - cancelled
    type: string
  usage:
    description: 'Represents token usage details including input tokens, output tokens,
      a

      breakdown of output tokens, and the total tokens used. Only populated on

      batches created after September 7, 2025.

      '
    properties:
      input_tokens:
        description: The number of input tokens.
        type: integer
      input_tokens_details:
        description: A detailed breakdown of the input tokens.
        properties:
          cached_tokens:
            description: 'The number of tokens that were retrieved from the cache.
              [More on

              prompt caching](https://platform.openai.com/docs/guides/prompt-caching).

              '
            type: integer
        required:
        - cached_tokens
        type: object
      output_tokens:
        description: The number of output tokens.
        type: integer
      output_tokens_details:
        description: A detailed breakdown of the output tokens.
        properties:
          reasoning_tokens:
            description: The number of reasoning tokens.
            type: integer
        required:
        - reasoning_tokens
        type: object
      total_tokens:
        description: The total number of tokens used.
        type: integer
    required:
    - input_tokens
    - input_tokens_details
    - output_tokens
    - output_tokens_details
    - total_tokens
    type: object
required:
- id
- object
- endpoint
- input_file_id
- completion_window
- status
- created_at
