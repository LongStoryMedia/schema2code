$schema: "http://json-schema.org/draft-07/schema#"
title: AvailableTool
description: A tool made available for use in the system
type: object
properties:
  name:
    type: string
    description: The name of the tool
  description:
    type: string
    description: A description of the tool's purpose
  type:
    type: string
    description: The type of the tool
    enum: [static, dynamic]
additionalProperties: true  # Equivalent to extra = "ignore"