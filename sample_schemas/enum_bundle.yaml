$schema: http://json-schema.org/draft-07/schema#
title: EnumBundle
description: Multiple enums to test TypeScript generation and index exports
type: object
properties:
  status:
    type: string
    enum: [pending, running, done]
  level:
    type: string
    enum: [low, medium, high]
  flags:
    type: array
    items:
      type: string
      enum: [alpha, beta]
